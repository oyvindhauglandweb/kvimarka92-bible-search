  <style>
    :root{
      color-scheme:dark;
      --bg:#111;
      --card:#1d1d1d;
      --field:#252525;
      --border:#444;
      --text:#f2f2f2;
      --muted:#b8b8b8;
      --link:#82cfff;
      --ok:#8ee698;
    }
    *{box-sizing:border-box;}
    body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif;padding:18px;}
    .wrap{max-width:900px;margin:0 auto;}
    h1{margin:0 0 8px;text-align:center;}
    .sub{color:var(--muted);text-align:center;margin-bottom:20px;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;}
    input{width:100%;background:var(--field);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:12px;font:inherit;box-sizing:border-box;}
    .result-card{display:grid;grid-template-columns:minmax(0,1fr) 150px;gap:16px;align-items:start;width:100%;border-top:1px solid var(--border);padding:12px 0;background:transparent;color:var(--text);}
    .result-card:first-child{border-top:0;}
    .result-card.selected .result-main{background:rgba(142,230,152,.09);}
    .result-main{min-width:0;border:0;border-radius:8px;padding:8px;background:transparent;color:var(--text);text-align:left;cursor:pointer;font:inherit;}
    .result-main:hover{background:rgba(130,207,255,.08);}
    .ref{font-weight:bold;color:var(--link);}
    .selected-range{color:var(--muted);font-size:13px;margin-top:3px;}
    .score{color:var(--muted);font-size:13px;margin-top:3px;}
    .snippet{margin-top:6px;line-height:1.45;white-space:pre-wrap;}
    .range-controls{justify-self:end;display:flex;flex-direction:column;gap:10px;width:150px;}
    .range-row{display:grid;grid-template-columns:32px 44px 32px;gap:5px;align-items:center;justify-content:end;}
    .range-label{grid-column:1 / -1;color:var(--muted);font-size:12px;text-align:center;white-space:nowrap;line-height:1.1;}
    .range-button{width:32px;height:30px;border:1px solid var(--border);border-radius:7px;background:var(--field);color:var(--text);font-weight:bold;font-size:16px;cursor:pointer;padding:0;}
    .range-button:hover{background:#333;}
    .range-value{display:flex;align-items:center;justify-content:center;min-width:44px;height:30px;border:1px solid var(--border);border-radius:7px;background:rgba(255,255,255,.045);color:var(--text);font-weight:bold;font-size:14px;}
    .loading{color:var(--muted);}
    .selected-card{display:none;border-color:rgba(142,230,152,.65);box-shadow:0 0 0 1px rgba(142,230,152,.18);}
    .selected-card.visible{display:block;}
    .selected-label{color:var(--muted);font-size:13px;margin-bottom:6px;}
    .selected-reference{color:var(--ok);font-weight:bold;font-size:18px;margin-bottom:10px;}
    .selected-text{white-space:pre-wrap;line-height:1.55;background:rgba(255,255,255,.035);border:1px solid var(--border);border-radius:10px;padding:12px;}
    .actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;}
    .action-button{display:inline-flex;align-items:center;justify-content:center;min-height:36px;padding:0 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);text-decoration:none;font-size:14px;font-weight:bold;box-sizing:border-box;cursor:pointer;}
    .action-button:hover{background:#333;}
    .action-button.primary{background:var(--link);border-color:var(--link);color:#fff;}
    .copy-status{color:var(--ok);font-size:13px;margin-top:8px;min-height:18px;}
    @media(max-width:700px){
      body{padding:10px;}
      .result-card{grid-template-columns:1fr;}
      .range-controls{justify-self:start;width:auto;flex-direction:row;flex-wrap:wrap;}
      .actions{display:grid;grid-template-columns:1fr;}
      .action-button{width:100%;}
    }
  
    .selected-header-row{
      display:grid;
      grid-template-columns:minmax(0, 1fr) 150px;
      gap:16px;
      align-items:start;
    }

    .selected-range-controls{
      justify-self:end;
      display:flex;
      flex-direction:column;
      gap:10px;
      width:150px;
    }

    .selected-range-row{
      display:grid;
      grid-template-columns:32px 44px 32px;
      gap:5px;
      align-items:center;
      justify-content:end;
    }

    .selected-range-row .range-label{
      grid-column:1 / -1;
      color:var(--muted);
      font-size:12px;
      text-align:center;
      white-space:nowrap;
      line-height:1.1;
    }

    @media(max-width:700px){
      .selected-header-row{
        grid-template-columns:1fr;
      }
      .selected-range-controls{
        justify-self:start;
        width:auto;
        flex-direction:row;
        flex-wrap:wrap;
      }
    }

  const keys = [
    "kvimarka92BibleSearchInputVerse",
    "kvimarka92SelectedBibleVerse"
  ];

  const stores = [sessionStorage, localStorage];

  for(const key of keys){
    for(const storage of stores){
      try{
        const raw = storage.getItem(key);

        if(!raw){
          continue;
        }

        const data = JSON.parse(raw);

        if(data && (data.reference || data.text)){
          return data;
        }
      }catch(error){}
    }
  }

  return null;
}

function setSelectedBibleVersePayload(payload, message){
  if(!payload || (!payload.reference && !payload.text)){
    return;
  }

  selectedBibleVerse = {
    reference:String(payload.reference || "").trim(),
    text:String(payload.text || "").trim(),
    score:Number(payload.score || 0),
    source:String(payload.source || "Bibelen på Norsk (1930)").trim(),
    sourceId:String(payload.sourceId || "nb-1930").trim(),
    selectedAt:payload.selectedAt || new Date().toISOString()
  };

  selectedReference.textContent = selectedBibleVerse.reference;
  selectedText.textContent = selectedBibleVerse.text;
  selectedRange = rangeFromPayload(selectedBibleVerse);
  updateSelectedRangeControls();
  selectedCard.classList.add("visible");
  copyStatus.textContent = message || "";

  localStorage.setItem(SELECTED_VERSE_KEY, JSON.stringify(selectedBibleVerse));
  sessionStorage.setItem(SELECTED_VERSE_KEY, JSON.stringify(selectedBibleVerse));
  localStorage.setItem(OVERRIDE_KEY, JSON.stringify(selectedBibleVerse));
  sessionStorage.setItem(OVERRIDE_KEY, JSON.stringify(selectedBibleVerse));
}

function esc(value){
  return String(value ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
}

function parseReference(reference){
  const text = String(reference || "").trim();
  const match = text.match(/^(.+?)\s+(\d+)\s*,\s*(\d+)(?:\s*[–-]\s*(\d+))?$/);
  if(!match) return null;
  return { book:match[1].trim(), chapter:Number(match[2]), from:Number(match[3]), to:Number(match[4] || match[3]) };
}

function refKey(book, chapter, verse){
  return `${String(book || "").trim().toLowerCase()}|${Number(chapter)}|${Number(verse)}`;
}

function rangeKey(result){
  return String(result?.reference || "").trim();
}

function makeReference(book, chapter, from, to){
  if(Number(from) === Number(to)) return `${book} ${chapter},${from}`;
  return `${book} ${chapter},${from}–${to}`;
}

function getBaseRange(result){
  const parsed = parseReference(result?.reference);
  if(parsed) return parsed;
  return { book:String(result?.reference || "").trim(), chapter:0, from:0, to:0 };
}

function getRange(result){
  const key = rangeKey(result);
  const existing = rangeByReference.get(key);
  if(existing) return existing;
  const base = getBaseRange(result);
  const range = { book:base.book, chapter:base.chapter, from:base.from, to:base.to };
  rangeByReference.set(key, range);
  return range;
}

function getChapterLimits(book, chapter){
  const numbers = verses
    .filter(row => String(row.book || "").trim().toLowerCase() === String(book || "").trim().toLowerCase() && Number(row.chapter) === Number(chapter))
    .map(row => Number(row.verse))
    .filter(Number.isFinite);
  if(!numbers.length) return { min:1, max:999 };
  return { min:Math.min(...numbers), max:Math.max(...numbers) };
}


function isFirstVerseInChapter(book, chapter, verseNo){
  const limits = getChapterLimits(book, chapter);
  return Number(verseNo) <= Number(limits.min);
}

function isLastVerseInChapter(book, chapter, verseNo){
  const limits = getChapterLimits(book, chapter);
  return Number(verseNo) >= Number(limits.max);
}

// Range buttons are hidden only at chapter boundaries. When from == to, +/- still moves the single selected verse.
function rangeButtonClass(hidden){
  return hidden ? "range-button hidden-range-button" : "range-button";
}


function normalizeVerseRow(row){
  const parsed = parseReference(row.reference);
  return {
    ...row,
    book:parsed ? parsed.book : String(row.bookName || row.book || "").trim(),
    chapter:parsed ? parsed.chapter : Number(row.chapter || 0),
    verse:parsed ? parsed.from : Number(row.verse || row.verseFrom || row.verseNo || 0),
    text:String(row.text || "").trim(),
    reference:String(row.reference || "").trim()
  };
}

function buildVerseMap(){
  verses = verses.map(normalizeVerseRow);
  verseMap = new Map();
  verses.forEach(row => {
    if(row.book && row.chapter && row.verse){
      verseMap.set(refKey(row.book, row.chapter, row.verse), row);
    }
  });
}

function getRowsForRange(range){
  const from = Math.min(Number(range.from || 0), Number(range.to || 0));
  const to = Math.max(Number(range.from || 0), Number(range.to || 0));
  const rows = [];
  for(let verseNo = from; verseNo <= to; verseNo += 1){
    const row = verseMap.get(refKey(range.book, range.chapter, verseNo));
    if(row) rows.push(row);
  }
  return rows;
}

function getTextForRange(result){
  const range = getRange(result);
  const rows = getRowsForRange(range);
  if(!rows.length) return String(result?.verse?.text || result?.text || result?.snippet || "").trim();
  if(rows.length === 1) return rows[0].text;
  return rows.map(row => `${row.verse} ${row.text}`).join("\n");
}

function getResultDisplayText(result){
  const fullText = getTextForRange(result);

  if(fullText){
    return fullText;
  }

  return String(result?.snippet || result?.verse?.text || result?.text || "").trim();
}


function getPayload(result){
  const range = getRange(result);
  return {
    reference:makeReference(range.book, range.chapter, range.from, range.to),
    text:getTextForRange(result),
    score:Number(result?.score || 0),
    source:"Bibelen på Norsk (1930)",
    sourceId:"nb-1930",
    selectedAt:new Date().toISOString()
  };
}

let selectedRange = null;

function rangeFromPayload(payload){
  const parsed = parseReference(payload?.reference);

  if(!parsed){
    return null;
  }

  return {
    book:parsed.book,
    chapter:parsed.chapter,
    from:parsed.from,
    to:parsed.to
  };
}

function getTextForExplicitRange(range, fallbackText){
  if(!range){
    return String(fallbackText || "").trim();
  }

  const rows = getRowsForRange(range);

  if(!rows.length){
    return String(fallbackText || "").trim();
  }

  if(rows.length === 1){
    return rows[0].text;
  }

  return rows.map(row => `${row.verse} ${row.text}`).join("\n");
}

function updateSelectedRangeControls(){
  if(!selectedRange){
    selectedRangeControls.style.display = "none";
    return;
  }

  selectedRangeControls.style.display = "";
  selectedFromVerse.textContent = String(selectedRange.from);
  selectedToVerse.textContent = String(selectedRange.to);

  const fromMinus = document.getElementById("selectedFromMinus");
  const fromPlus = document.getElementById("selectedFromPlus");
  const toMinus = document.getElementById("selectedToMinus");
  const toPlus = document.getElementById("selectedToPlus");
  const limits = getChapterLimits(selectedRange.book, selectedRange.chapter);

  if(fromMinus) fromMinus.classList.toggle("hidden-range-button", Number(selectedRange.from) <= Number(limits.min));
  if(fromPlus) fromPlus.classList.toggle("hidden-range-button", Number(selectedRange.from) >= Number(limits.max));
  if(toMinus) toMinus.classList.toggle("hidden-range-button", Number(selectedRange.to) <= Number(limits.min));
  if(toPlus) toPlus.classList.toggle("hidden-range-button", Number(selectedRange.to) >= Number(limits.max));
}

function updateSelectedPayloadFromRange(){
  if(!selectedBibleVerse || !selectedRange){
    updateSelectedRangeControls();
    return;
  }

  selectedBibleVerse.reference = makeReference(
    selectedRange.book,
    selectedRange.chapter,
    selectedRange.from,
    selectedRange.to
  );

  selectedBibleVerse.text = getTextForExplicitRange(selectedRange, selectedBibleVerse.text);
  selectedBibleVerse.selectedAt = new Date().toISOString();

  selectedReference.textContent = selectedBibleVerse.reference;
  selectedText.textContent = selectedBibleVerse.text;
  updateSelectedRangeControls();

  localStorage.setItem(SELECTED_VERSE_KEY, JSON.stringify(selectedBibleVerse));
  sessionStorage.setItem(SELECTED_VERSE_KEY, JSON.stringify(selectedBibleVerse));
  localStorage.setItem(OVERRIDE_KEY, JSON.stringify(selectedBibleVerse));
  sessionStorage.setItem(OVERRIDE_KEY, JSON.stringify(selectedBibleVerse));
}

window.changeSelectedRange = function(event, side, delta){
  event.preventDefault();
  event.stopPropagation();

  if(!selectedRange){
    selectedRange = rangeFromPayload(selectedBibleVerse);
  }

  if(!selectedRange){
    return;
  }

  const limits = getChapterLimits(selectedRange.book, selectedRange.chapter);

  if(side === "from"){
    selectedRange.from = Math.max(limits.min, Math.min(limits.max, Number(selectedRange.from) + Number(delta)));
    if(selectedRange.from > selectedRange.to){
      selectedRange.to = selectedRange.from;
    }
  }else{
    selectedRange.to = Math.max(limits.min, Math.min(limits.max, Number(selectedRange.to) + Number(delta)));
    if(selectedRange.to < selectedRange.from){
      selectedRange.from = selectedRange.to;
    }
  }

  updateSelectedPayloadFromRange();
};

function selectedFullText(){
  if(!selectedBibleVerse) return "";
  return `${selectedBibleVerse.reference}\n${selectedBibleVerse.text}`;
}

function updateSelected(index){
  const result = currentResults[index];
  if(!result) return;
  selectedIndex = index;
  selectedBibleVerse = getPayload(result);
  selectedRange = { ...getRange(result) };
  selectedReference.textContent = selectedBibleVerse.reference;
  selectedText.textContent = selectedBibleVerse.text;
  updateSelectedRangeControls();
  selectedCard.classList.add("visible");
  copyStatus.textContent = "";
  localStorage.setItem("kvimarka92SelectedBibleVerse", JSON.stringify(selectedBibleVerse));
  sessionStorage.setItem("kvimarka92SelectedBibleVerse", JSON.stringify(selectedBibleVerse));
}

async function copyText(text){
  if(!text) return;
  try{
    await navigator.clipboard.writeText(text);
    copyStatus.textContent = "Kopiert.";
  }catch(error){
    copyStatus.textContent = "Kunne ikke kopiere automatisk. Marker teksten og kopier manuelt.";
  }
  window.setTimeout(() => {
    if(copyStatus.textContent === "Kopiert.") copyStatus.textContent = "";
  }, 2500);
}

window.copySelectedReference = function(){
  if(selectedBibleVerse) copyText(selectedBibleVerse.reference);
};

window.copySelectedFullText = function(){
  copyText(selectedFullText());
};

window.useSelectedBibleVerse = function(){
  if(!selectedBibleVerse) return;
  localStorage.setItem("kvimarka92SelectedBibleVerse", JSON.stringify(selectedBibleVerse));
  sessionStorage.setItem("kvimarka92SelectedBibleVerse", JSON.stringify(selectedBibleVerse));
  if(window.opener && !window.opener.closed){
    window.opener.postMessage({ type:"kvimarka92:bible-verse-selected", payload:selectedBibleVerse }, window.location.origin);
  }
  copyStatus.textContent = "Valgt bibelsted er lagret for videre bruk.";
  if(window.opener && !window.opener.closed){
    setTimeout(() => {
      try{ window.close(); }catch(error){}
    }, 150);
  }
};

window.selectBibleResult = function(index){
  updateSelected(index);
  render();
  selectedCard.scrollIntoView({ behavior:"smooth", block:"nearest" });
};

window.changeRange = function(event, index, side, delta){
  event.preventDefault();
  event.stopPropagation();
  const result = currentResults[index];
  if(!result) return;
  const range = getRange(result);
  const limits = getChapterLimits(range.book, range.chapter);
  if(side === "from"){
    range.from = Math.max(limits.min, Math.min(limits.max, Number(range.from) + Number(delta)));
    if(range.from > range.to) range.to = range.from;
  }else{
    range.to = Math.max(limits.min, Math.min(limits.max, Number(range.to) + Number(delta)));
    if(range.to < range.from) range.from = range.to;
  }
  rangeByReference.set(rangeKey(result), range);
  if(selectedIndex === index){
    updateSelected(index);
  }
  render();
};

function render(){
  const query = input.value.trim();
  if(!passages.length){
    resultsBox.innerHTML = '<div class="loading">Søkeindeks er ikke lastet.</div>';
    return;
  }
  if(query.length < 2){
    resultsBox.textContent = "Skriv minst to tegn.";
    currentResults = [];
    selectedIndex = null;
    return;
  }
  currentResults = searchBibleVerses(query, passages, { limit: 12 });
  if(!currentResults.length){
    resultsBox.textContent = "Ingen treff.";
    return;
  }
  resultsBox.innerHTML = currentResults.map((result, index) => {
    const range = getRange(result);
    const selectedClass = selectedIndex === index ? " selected" : "";
    const selectedRef = makeReference(range.book, range.chapter, range.from, range.to);
    const isExpanded = selectedRef !== result.reference;
    const limits = getChapterLimits(range.book, range.chapter);
    const hideFromMinus = Number(range.from) <= Number(limits.min);
    const hideFromPlus = Number(range.from) >= Number(limits.max);
    const hideToMinus = Number(range.to) <= Number(limits.min);
    const hideToPlus = Number(range.to) >= Number(limits.max);

    return `
      <div class="result-card${selectedClass}" data-result-index="${index}">
        <button class="result-main" type="button" onclick="selectBibleResult(${index})" title="Velg ${esc(result.reference)}">
          <div class="ref">${esc(result.reference)}</div>
          ${isExpanded ? `<div class="selected-range">Valg: ${esc(selectedRef)}</div>` : ""}
          <div class="score">Score: ${esc(result.score)}</div>
          <div class="snippet">${esc(getResultDisplayText(result))}</div>
        </button>
        <div class="range-controls" aria-label="Velg versområde">
          <div class="range-row">
            <div class="range-label">Fra vers</div>
            <button class="${rangeButtonClass(hideFromMinus)}" type="button" onclick="changeRange(event, ${index}, 'from', -1)">−</button>
            <div class="range-value">${esc(range.from)}</div>
            <button class="${rangeButtonClass(hideFromPlus)}" type="button" onclick="changeRange(event, ${index}, 'from', 1)">+</button>
          </div>
          <div class="range-row">
            <div class="range-label">Til vers</div>
            <button class="${rangeButtonClass(hideToMinus)}" type="button" onclick="changeRange(event, ${index}, 'to', -1)">−</button>
            <div class="range-value">${esc(range.to)}</div>
            <button class="${rangeButtonClass(hideToPlus)}" type="button" onclick="changeRange(event, ${index}, 'to', 1)">+</button>
          </div>
        </div>
      </div>
    `;
  }).join("");
}

async function loadJson(path){
  const response = await fetch(path, { cache:"no-store" });
  if(!response.ok) throw new Error(`${path}: HTTP ${response.status}`);
  return await response.json();
}

async function loadIndex(){
  try{
    const [indexData, versesData] = await Promise.all([
      loadJson("./data/index/nb-1930-search-index.json"),
      loadJson("./data/normalized/nb-1930-verses.json")
    ]);
    passages = Array.isArray(indexData) ? indexData : [];
    verses = Array.isArray(versesData) ? versesData : [];
    buildVerseMap();
    const storedVerse = readStoredSelectedBibleVerse();
    if(storedVerse){
      setSelectedBibleVersePayload(storedVerse, "Eksisterende bibelsted er hentet fra opplevelsen. Søk for å velge et annet.");
      resultsBox.textContent = "Eksisterende bibelsted er valgt. Skriv søkeord for å finne et annet bibelsted.";
    }else{
      resultsBox.textContent = `Søkeindeks lastet (${passages.length} tekstvinduer, ${verses.length} vers). Skriv minst to tegn.`;
    }
  }catch(error){
    resultsBox.innerHTML = `
      <div class="loading">
        Kunne ikke laste bibeldata.<br><br>
        Detalj: ${esc(error.message)}<br><br>
        Kjør importscriptet først:<br>
        <code>py scripts/import-crosswire-norsk.py</code>
      </div>
    `;
  }
}

input.addEventListener("input", render);
loadIndex();
</script>
