<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Opplevelser - registrer v2</title>
  <style>
    :root{
      color-scheme: light dark;
      --bg:#f4f5f7;
      --card:#ffffff;
      --text:#172033;
      --muted:#5d6678;
      --border:#d8dde8;
      --accent:#2563eb;
      --danger:#b42318;
      --ok:#067647;
    }
    @media (prefers-color-scheme: dark){
      :root{ --bg:#10131a; --card:#171b24; --text:#f1f5f9; --muted:#a7b0c0; --border:#303746; --accent:#7aa2ff; }
    }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:var(--bg); color:var(--text); }
    .wrap{ max-width:920px; margin:0 auto; padding:18px; }
    .card{ background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px; box-shadow:0 10px 25px rgba(15,23,42,.08); }
    h1{ margin:0 0 4px; font-size:1.6rem; }
    .sub{ color:var(--muted); margin:0 0 18px; }
    .grid{ display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; }
    .full{ grid-column:1 / -1; }
    label{ display:block; font-weight:650; margin:0 0 6px; }
    input, textarea, select{ width:100%; min-height:44px; border:1px solid var(--border); border-radius:10px; padding:10px 12px; font:inherit; background:transparent; color:var(--text); box-sizing:border-box; }
    textarea{ min-height:110px; resize:vertical; }
    .buttons{ display:flex; flex-wrap:wrap; gap:10px; margin-top:16px; }
    button{ border:0; border-radius:999px; padding:10px 14px; font-weight:700; cursor:pointer; background:var(--accent); color:white; }
    button.secondary{ background:transparent; color:var(--text); border:1px solid var(--border); }
    button:disabled{ opacity:.6; cursor:not-allowed; }
    .status{ margin-top:14px; padding:10px 12px; border-radius:10px; border:1px solid var(--border); color:var(--muted); white-space:pre-wrap; }
    .status.ok{ color:var(--ok); }
    .status.err{ color:var(--danger); }
    .bible-card{ border:1px dashed var(--border); border-radius:12px; padding:12px; color:var(--muted); }
    .bible-card strong{ color:var(--text); }
    .small{ font-size:.92rem; color:var(--muted); }

    select{
      display:block;
      width:100%;
      min-height:44px;
      padding:0 38px 0 12px;
      border:1px solid var(--border);
      border-radius:10px;
      background:var(--card);
      color:var(--text);
      font:inherit;
      line-height:44px;
      box-sizing:border-box;
      outline:none;
    }

    select:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 2px rgba(122,162,255,.22);
    }

    select:disabled{
      opacity:.65;
      cursor:not-allowed;
    }

    select option{
      background:#242424;
      color:#ffffff;
    }



/* Opplevelser standard design v14 */
html.opplevelser-size-small{--opp-font-scale:1;}
html.opplevelser-size-medium{--opp-font-scale:1.12;}
html.opplevelser-size-large{--opp-font-scale:1.25;}

:root{
  --opp-bg:#f2f2f2;
  --opp-card:#fff;
  --opp-text:#333;
  --opp-muted:#667;
  --opp-border:#ccc;
  --opp-link:#1f789d;
  --opp-button:#fff;
  --opp-button-hover:#e9eef2;
  --opp-soft:#eaeaea;
  --opp-danger:#d77;
  --opp-success:#72c184;
}
body.dark-mode{
  --opp-bg:#151515;
  --opp-card:#242424;
  --opp-text:#eee;
  --opp-muted:#bbb;
  --opp-border:#555;
  --opp-link:#7cc7e8;
  --opp-button:#242424;
  --opp-button-hover:#3a3a3a;
  --opp-soft:#333;
}
body.light-mode{
  --opp-bg:#f2f2f2;
  --opp-card:#fff;
  --opp-text:#333;
  --opp-muted:#667;
  --opp-border:#ccc;
  --opp-link:#1f789d;
  --opp-button:#fff;
  --opp-button-hover:#e9eef2;
  --opp-soft:#eaeaea;
}
body{
  background:var(--opp-bg) !important;
  color:var(--opp-text) !important;
  font-size:calc(16px * var(--opp-font-scale, 1)) !important;
}
.wrap,.container{
  max-width:980px !important;
  margin:auto !important;
  padding:0 !important;
}
.header{
  text-align:center !important;
  margin-bottom:20px !important;
}
.site-title{
  margin:0 !important;
  font-size:30px !important;
  font-weight:800 !important;
}
.subtitle{
  margin-top:8px !important;
  color:var(--opp-muted) !important;
  font-size:16px !important;
}
.top-buttons{
  display:flex !important;
  justify-content:center !important;
  align-items:center !important;
  gap:10px !important;
  margin:14px 0 0 !important;
  flex-wrap:wrap !important;
}
.top-button{
  display:inline-flex !important;
  align-items:center !important;
  justify-content:center !important;
  width:44px !important;
  height:44px !important;
  padding:0 !important;
  background:var(--opp-card) !important;
  border:1px solid var(--opp-border) !important;
  border-radius:8px !important;
  color:var(--opp-text) !important;
  text-decoration:none !important;
  font-size:24px !important;
  font-weight:bold !important;
  line-height:1 !important;
  cursor:pointer !important;
}
.top-button:hover,
button:hover{
  background:var(--opp-button-hover) !important;
}
.top-button.app-switch-button{font-size:19px !important;}
.font-size-button{font-size:18px !important;}
.design-toggle-button{font-size:21px !important;}
.card{
  background:var(--opp-card) !important;
  border:1px solid var(--opp-border) !important;
  color:var(--opp-text) !important;
}
input,textarea,select{
  background:var(--opp-card) !important;
  color:var(--opp-text) !important;
  border:1px solid var(--opp-border) !important;
}
button,.secondary{
  background:var(--opp-button) !important;
  color:var(--opp-text) !important;
  border:1px solid var(--opp-border) !important;
}
button:not(.secondary), button.primary, .primary{
  background:var(--opp-link) !important;
  border-color:var(--opp-link) !important;
  color:#fff !important;
}
.status{color:var(--opp-muted) !important;}
.status.err,.status.error{color:var(--opp-danger) !important;}
.status.ok,.status.success{color:var(--opp-success) !important;}
.item,.details,.items,.bible{
  background:var(--opp-card) !important;
  border-color:var(--opp-border) !important;
  color:var(--opp-text) !important;
}
.item.active{
  background:rgba(124,199,232,.16) !important;
}

/* Soft design: fjern oppstreket uttrykk og bruk rolige bakgrunner, som Handleliste soft mode. */
html:not(.classic-design-root) .card,
html:not(.classic-design-root) .details,
html:not(.classic-design-root) .items,
html:not(.classic-design-root) .bible{
  border:0 !important;
  background:rgba(255,255,255,.038) !important;
  box-shadow:none !important;
}
html:not(.classic-design-root) .item,
html:not(.classic-design-root) input,
html:not(.classic-design-root) textarea,
html:not(.classic-design-root) select{
  border:0 !important;
  background:rgba(0,0,0,.18) !important;
  box-shadow:none !important;
}
html:not(.classic-design-root) .top-button,
html:not(.classic-design-root) button,
html:not(.classic-design-root) .secondary{
  border:0 !important;
  background:rgba(255,255,255,.055) !important;
  box-shadow:none !important;
}
html:not(.classic-design-root) button:not(.secondary),
html:not(.classic-design-root) button.primary,
html:not(.classic-design-root) .primary{
  background:var(--opp-link) !important;
  color:#fff !important;
}
body.light-mode html:not(.classic-design-root),
body.light-mode:not(.classic-design-root) .card{
  background:rgba(0,0,0,.035) !important;
}
@media(max-width:700px){
  body{padding:6px !important;}
  .header{margin-bottom:12px !important;}
  .site-title{font-size:28px !important;}
  .top-buttons{gap:8px !important;}
  .top-button{width:40px !important;height:40px !important;font-size:22px !important;}
}


/* Opplevelser v15 design polish */
.top-button,
html:not(.classic-design-root) .top-button,
html:not(.classic-design-root) button.top-button{
  background:rgba(255,255,255,.055) !important;
  color:var(--opp-text) !important;
  border:0 !important;
  box-shadow:none !important;
}
.top-button:hover,
html:not(.classic-design-root) .top-button:hover{
  background:rgba(255,255,255,.10) !important;
  color:var(--opp-text) !important;
}
.top-button.app-switch-button{
  font-size:28px !important;
}
.top-button.home-button{
  font-size:30px !important;
}
.top-button.font-size-button{
  font-size:18px !important;
}
.top-button.design-toggle-button{
  font-size:21px !important;
}

/* Valgt opplevelse: diskret grå utheving i stedet for blå flate */
.item.active,
html:not(.classic-design-root) .item.active{
  background:rgba(255,255,255,.085) !important;
  color:var(--opp-text) !important;
}
body.light-mode .item.active,
body.light-mode html:not(.classic-design-root) .item.active{
  background:rgba(0,0,0,.075) !important;
}

/* Bibelsted/status skal være myke flater uten linjemarkering */
html:not(.classic-design-root) .bible,
html:not(.classic-design-root) .selected-text,
html:not(.classic-design-root) .status,
html:not(.classic-design-root) .status.card,
html:not(.classic-design-root) #status{
  border:0 !important;
  background:rgba(0,0,0,.16) !important;
  box-shadow:none !important;
}
body.light-mode html:not(.classic-design-root) .bible,
body.light-mode html:not(.classic-design-root) .selected-text,
body.light-mode html:not(.classic-design-root) .status,
body.light-mode html:not(.classic-design-root) .status.card,
body.light-mode html:not(.classic-design-root) #status{
  background:rgba(0,0,0,.045) !important;
}



/* Opplevelser v19: login widget copied from Kvimarka92 index style */
.login-widget{
  position:absolute;
  top:20px;
  right:max(20px, calc((100vw - 980px) / 2));
  z-index:9999;
  height:38px;
  display:flex;
  align-items:center;
}

.login-status{
  display:flex;
  align-items:center;
  justify-content:center;
  width:38px;
  height:38px;
  min-width:38px;
  min-height:38px;
  padding:0;
  border:1px solid var(--opp-border, var(--border, #555));
  background:var(--opp-card, var(--card, #242424));
  border-radius:50%;
  color:var(--opp-muted, var(--muted, #bbb));
  text-decoration:none;
  font-size:13px;
  font-weight:bold;
  line-height:1;
  opacity:.86;
  box-sizing:border-box;
  cursor:pointer;
  white-space:nowrap;
}

.login-status:hover{
  opacity:1;
  color:var(--opp-text, var(--text, #eee));
  background-color:var(--opp-card, var(--card, #242424));
}

.login-status.is-signin{
  border:none;
  border-radius:0;
  background-color:transparent;
  background-image:url("LogInDG.png");
  background-repeat:no-repeat;
  background-position:center;
  background-size:38px 38px;
  text-indent:-9999px;
  overflow:hidden;
}

.login-menu{
  position:absolute;
  top:44px;
  right:0;
  min-width:247px;
  padding:10px;
  border:0;
  border-radius:10px;
  background:rgba(255,255,255,.06);
  color:var(--opp-text, var(--text, #eee));
  box-shadow:none;
  box-sizing:border-box;
}

html.classic-design-root .login-menu{
  border:1px solid var(--opp-border, var(--border, #555));
  background:var(--opp-card, var(--card, #242424));
  box-shadow:0 8px 24px rgba(0,0,0,.18);
}

.login-menu-name{
  font-weight:bold;
  font-size:13px;
  margin-bottom:8px;
  color:var(--opp-text, var(--text, #eee));
  white-space:nowrap;
}

.login-menu-link{
  display:block;
  padding:8px 10px;
  margin:0 -4px -4px;
  border-radius:8px;
  color:var(--opp-link, var(--link, #7cc7e8));
  text-decoration:none;
  font-weight:bold;
  font-size:13px;
}

.login-menu-link:hover{
  background:rgba(127,127,127,.10);
}

.login-menu-link:active{
  background:rgba(127,127,127,.22);
}

@media(max-width:800px){
  .login-widget{
    top:10px;
    right:10px;
  }
}


/* Opplevelser v20 voice buttons right side */
.voice-field-header{
  display:flex !important;
  align-items:center !important;
  justify-content:space-between !important;
  gap:10px !important;
  margin-bottom:6px !important;
}
.voice-field-header label{
  margin:0 !important;
}
.voice-actions{
  display:flex !important;
  align-items:center !important;
  justify-content:flex-end !important;
  gap:8px !important;
  margin-left:auto !important;
}
.clear-voice-button,
.mic-button{
  display:inline-flex !important;
  align-items:center !important;
  justify-content:center !important;
  width:36px !important;
  height:32px !important;
  min-height:32px !important;
  padding:0 !important;
  border:0 !important;
  border-radius:999px !important;
  background:rgba(255,255,255,.07) !important;
  color:var(--opp-text, #eee) !important;
  font-size:16px !important;
  font-weight:800 !important;
  line-height:1 !important;
  cursor:pointer !important;
  box-shadow:none !important;
}
.clear-voice-button:hover,
.mic-button:hover{
  background:rgba(255,255,255,.13) !important;
}
.clear-voice-button{
  font-size:19px !important;
}
.mic-button{
  display:none !important;
}
.mic-button.visible{
  display:inline-flex !important;
}
.mic-button.listening{
  background:#c2410c !important;
  color:#fff !important;
  animation:oppMicPulse 1s infinite;
}
body.light-mode .clear-voice-button,
body.light-mode .mic-button{
  background:rgba(0,0,0,.07) !important;
  color:var(--opp-text, #333) !important;
}
body.light-mode .clear-voice-button:hover,
body.light-mode .mic-button:hover{
  background:rgba(0,0,0,.13) !important;
}


/* Opplevelser v23/v17 Bible header display */
.bible-display-header{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:14px;
  margin:18px 0 8px;
  flex-wrap:wrap;
}
.bible-display-title{
  font-weight:800;
  color:var(--opp-text, #eee);
}
.bible-display-source{
  margin-left:auto;
  color:var(--opp-muted, #bbb);
  font-size:.92em;
  white-space:nowrap;
}
.bible-hidden-input{
  display:none !important;
}
@media(max-width:700px){
  .bible-display-header{
    display:block;
  }
  .bible-display-source{
    display:block;
    margin:4px 0 0;
  }
}


/* Opplevelser final icon normalization */
.top-button svg,
.mic-button svg{
  width:22px;
  height:22px;
  display:block;
  color:currentColor;
}
.mic-button svg{
  width:18px;
  height:18px;
}


/* Opplevelser v25/v19 final field polish */
.clear-voice-button{
  background:rgba(255,255,255,.075) !important;
  color:var(--opp-text, #eee) !important;
  border:0 !important;
  box-shadow:none !important;
}
.clear-voice-button:hover{
  background:rgba(255,255,255,.13) !important;
}
body.light-mode .clear-voice-button{
  background:rgba(0,0,0,.075) !important;
  color:var(--opp-text, #333) !important;
}
body.light-mode .clear-voice-button:hover{
  background:rgba(0,0,0,.13) !important;
}

.bible-click-frame{
  cursor:pointer;
  transition:background .15s ease, box-shadow .15s ease;
}
.bible-click-frame:hover{
  background:rgba(255,255,255,.075) !important;
}
body.light-mode .bible-click-frame:hover{
  background:rgba(0,0,0,.075) !important;
}
.bible-click-frame::after{
  content:"";
  display:block;
  margin-top:6px;
  color:var(--opp-muted, #bbb);
  font-size:.86em;
  opacity:.85;
}

textarea.auto-grow-textarea{
  overflow:hidden !important;
  resize:none !important;
  min-height:88px;
}


/* Register v26: remove outer frame and neutral delete buttons */
body .wrap,
body .container,
body .card.main-card,
body .main-card,
body form.card,
body #experienceForm.card{
  border:0 !important;
  background:transparent !important;
  box-shadow:none !important;
}

body .card:first-of-type{
  border:0 !important;
  background:transparent !important;
  box-shadow:none !important;
}

.clear-voice-button,
body.dark-mode .clear-voice-button,
body.light-mode .clear-voice-button,
html:not(.classic-design-root) .clear-voice-button,
body.dark-mode html:not(.classic-design-root) .clear-voice-button,
body.light-mode html:not(.classic-design-root) .clear-voice-button{
  background:rgba(255,255,255,.075) !important;
  color:var(--opp-text, #eee) !important;
  border:0 !important;
  box-shadow:none !important;
}

.clear-voice-button:hover,
body.dark-mode .clear-voice-button:hover,
body.light-mode .clear-voice-button:hover,
html:not(.classic-design-root) .clear-voice-button:hover{
  background:rgba(255,255,255,.13) !important;
  color:var(--opp-text, #eee) !important;
}

body.light-mode .clear-voice-button,
body.light-mode html:not(.classic-design-root) .clear-voice-button{
  background:rgba(0,0,0,.075) !important;
  color:var(--opp-text, #333) !important;
}

body.light-mode .clear-voice-button:hover,
body.light-mode html:not(.classic-design-root) .clear-voice-button:hover{
  background:rgba(0,0,0,.13) !important;
  color:var(--opp-text, #333) !important;
}


/* Kvimarka92/Handleliste layout standard v27 */
body{
  background:#111 !important;
}
.header,
.header.card,
.header-panel,
.top-panel{
  border:0 !important;
  background:transparent !important;
  box-shadow:none !important;
}

.wrap,
.container{
  background:transparent !important;
  border:0 !important;
  box-shadow:none !important;
}

.site-title,
.subtitle,
.top-buttons{
  background:transparent !important;
  border:0 !important;
  box-shadow:none !important;
}

/* Natural content sections start below the header */
.content-section,
.form-section,
.search-section,
.list-section,
.detail-section,
.status-section{
  background:rgba(255,255,255,.045) !important;
  border:0 !important;
  border-radius:10px !important;
  box-shadow:none !important;
}

/* If old card class is used for content, keep it section-like, but never around header */
.card:not(.selected-card):not(.header){
  background:rgba(255,255,255,.045) !important;
  border:0 !important;
  border-radius:10px !important;
  box-shadow:none !important;
}

.status,
#status{
  background:rgba(255,255,255,.045) !important;
  border:0 !important;
  border-radius:10px !important;
  box-shadow:none !important;
}

body.light-mode .content-section,
body.light-mode .form-section,
body.light-mode .search-section,
body.light-mode .list-section,
body.light-mode .detail-section,
body.light-mode .status-section,
body.light-mode .card:not(.selected-card):not(.header),
body.light-mode .status,
body.light-mode #status{
  background:rgba(0,0,0,.045) !important;
}

.items,
.details,
#items,
#details{
  background:rgba(255,255,255,.045) !important;
  border:0 !important;
  border-radius:10px !important;
  box-shadow:none !important;
}

body.light-mode .items,
body.light-mode .details,
body.light-mode #items,
body.light-mode #details{
  background:rgba(0,0,0,.045) !important;
}

.item{
  background:rgba(0,0,0,.18) !important;
  border:0 !important;
  box-shadow:none !important;
}

.item.active{
  background:rgba(255,255,255,.095) !important;
}

body.light-mode .item{
  background:rgba(0,0,0,.035) !important;
}

body.light-mode .item.active{
  background:rgba(0,0,0,.085) !important;
}

/* Top buttons follow Handleliste look */
.top-button{
  background:rgba(255,255,255,.055) !important;
  border:0 !important;
  box-shadow:none !important;
}
.top-button:hover{
  background:rgba(255,255,255,.10) !important;
}
body.light-mode .top-button{
  background:rgba(0,0,0,.055) !important;
}
body.light-mode .top-button:hover{
  background:rgba(0,0,0,.10) !important;
}


/* v28: header area must never have a background frame */
body > .wrap,
body > .container,
.wrap,
.container,
main,
.app,
.page,
.panel,
.main,
.shell{
  background:transparent !important;
  border:0 !important;
  box-shadow:none !important;
}

/* If the first large wrapper/card contains the header, make it transparent */
body > .card:first-child,
body > .wrap > .card:first-child,
body > .container > .card:first-child,
.wrap > .card:first-child,
.container > .card:first-child{
  background:transparent !important;
  border:0 !important;
  box-shadow:none !important;
}

/* Header and all top controls stand freely */
.header,
.header *,
.site-title,
.subtitle,
.top-buttons,
.login-widget{
  box-shadow:none !important;
}
.header,
.site-title,
.subtitle,

      // For POST bruker vi text/plain, samme mønster som flere eksisterende Kvimarka92-sider,
      // slik at nettleseren ikke sender OPTIONS-preflight før selve API-kallet.
      if(method !== "GET" && safeOptions.body !== undefined && !headers["Content-Type"]){
        headers["Content-Type"] = "text/plain;charset=UTF-8";
      }

      const res = await fetch(API_BASE + path, {
        credentials:"include",
        ...safeOptions,
        method,
        headers
      });

      const data = await res.json().catch(() => ({}));

      if(!res.ok){
        throw new Error(data.detail || data.error || `HTTP ${res.status}`);
      }

      return data;
    }

    function fillDatalist(id, items, getName){
      const list = el(id);
      list.innerHTML = "";

      (items || []).forEach(item => {
        const name = getName ? getName(item) : item.name;
        if(!name) return;
        const option = document.createElement("option");
        option.value = name;
        list.appendChild(option);
      });
    }

    function fillSelect(id, items){
      const select = el(id);
      const currentValue = select.value;
      const names = [];

      (items || []).forEach(item => {
        const text = String((item && (item.name || item.environmentName || item.value)) || item || "").trim();
        if(text && !names.includes(text)) names.push(text);
      });

      select.innerHTML = "";

      const emptyOption = document.createElement("option");
      emptyOption.value = "";
      emptyOption.textContent = names.length ? "Velg miljø" : "Ingen miljøvalg funnet";
      select.appendChild(emptyOption);

      names.forEach(name => {
        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        select.appendChild(option);
      });

      select.disabled = names.length === 0;

      if(currentValue && names.includes(currentValue)){
        select.value = currentValue;
      }
    }

    function setBibleVerse(verse){
      const reference = (verse && verse.reference || "").trim();
      const text = (verse && verse.text || "").trim();
      const source = (verse && verse.source || "Bibelen på Norsk (1930)").trim();

      el("bibleReference").value = reference;
      el("bibleText").value = text;
      el("bibleSource").value = source;

      if(reference || text){
        el("bibleCard").innerHTML = `<strong>${escapeHtml(reference || "Valgt bibelsted")}</strong><br>${escapeHtml(text)}<br><span class="small">${escapeHtml(source)}</span>`;
      }else{
        el("bibleCard").textContent = "Ingen bibelreferanse valgt ennå.";
      }
    }

    function escapeHtml(value){
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function readSelectedBibleVerseFromStorage(){
      const raw = localStorage.getItem(SELECTED_VERSE_KEY) || sessionStorage.getItem(SELECTED_VERSE_KEY);
      if(!raw) return null;
      try{ return JSON.parse(raw); }catch(error){ return null; }
    }

    function pollSelectedBibleVerseForAWhile(){
      let count = 0;
      const timer = setInterval(() => {
        count += 1;
        const verse = readSelectedBibleVerseFromStorage();
        if(verse && (verse.reference || verse.text)){
          setBibleVerse(verse);
          setStatus("Bibelsted valgt: " + (verse.reference || ""), "ok");
          clearInterval(timer);
        }
        if(count > 120){
          clearInterval(timer);
        }
      }, 1000);
    }

    window.addEventListener("message", event => {
      const data = event.data || {};
      if(data.type === "kvimarka92:bible-verse-selected"){
        setBibleVerse(data.payload || data.verse || data);
        setStatus("Bibelsted valgt.", "ok");
      }
    });

    el("findBibleBtn").addEventListener("click", () => {
      window.open(BIBLE_SEARCH_URL, "kvimarka92BibleSearch", "width=980,height=760");
      pollSelectedBibleVerseForAWhile();
    });

    el("clearBibleBtn").addEventListener("click", () => {
      setBibleVerse(null);
      localStorage.removeItem(SELECTED_VERSE_KEY);
      sessionStorage.removeItem(SELECTED_VERSE_KEY);
      setStatus("Bibelsted fjernet.");
    });

    el("resetBtn").addEventListener("click", () => {
      form.reset();
      setBibleVerse(null);
      initDate();
      setStatus("Skjema tømt.");
    });

    function initDate(defaultDate){
      el("experienceDate").value = defaultDate || new Date().toISOString().slice(0, 10);
    }

    async function loadOptions(){
      try{
        const data = await apiFetch("/experience-options", { method:"GET" });
        initDate(data.today);
        fillDatalist("placesList", data.places || []);
        const environmentOptions = data.environmentOptions || [];
        fillSelect("environment", environmentOptions);

        if(!environmentOptions.length){
          setStatus("Miljøvalg mangler: Worker returnerte ingen Baserow-options for Experiences → Environment.", "err");
        }
        setupOpplevelserLoginWidget(data.user);
      el("userLine").textContent = "";

        const storedVerse = readSelectedBibleVerseFromStorage();
        if(storedVerse && (storedVerse.reference || storedVerse.text)){
          setBibleVerse(storedVerse);
        }

        setStatus("Klar.");
      }catch(error){
        const envSelect = el("environment");
        if(envSelect){
          envSelect.innerHTML = '<option value="">Kunne ikke hente miljøvalg</option>';
          envSelect.disabled = true;
        }
        setStatus("Kunne ikke laste Opplevelser: " + error.message, "err");
      }
    }

    form.addEventListener("submit", async event => {
      event.preventDefault();
      el("saveBtn").disabled = true;
      setStatus("Lagrer ...");

      const payload = {
        experienceDate:parseOpplevelserDate(el("experienceDate").value),
        heading:el("heading").value,
        place:el("place").value,
        environment:el("environment").value,
        occasion:el("occasion").value,
        experience:el("experience").value,
        bibleReference:el("bibleReference").value,
        bibleText:el("bibleText").value,
        bibleSource:el("bibleSource").value,
        consequence:el("consequence").value,
        note:el("note").value
      };

      try{
        const data = await apiFetch("/experience-create", {
          method:"POST",
          body:JSON.stringify(payload)
        });

        setStatus(`Opplevelse lagret. Rad-ID: ${data.id}`, "ok");
        await loadOptions();
      }catch(error){
        setStatus("Lagring feilet: " + error.message, "err");
      }finally{
        el("saveBtn").disabled = false;
      }
    });

    loadOptions();
  </script>


<script>
/* Opplevelser standard cleanup v50/v43
   Én samlet theme/selected helper. */
(function(){
  const THEME_KEYS = ["kvimarka92Theme", "opplevelserTheme", "theme"];

  function readStoredTheme(){
    for(const key of THEME_KEYS){
      try{
        const value = localStorage.getItem(key);
        if(value === "light" || value === "dark"){
          return value;
        }
      }catch(error){}
    }
    return "";
  }

  function storeTheme(theme){
    THEME_KEYS.forEach(key => {
      try{ localStorage.setItem(key, theme); }catch(error){}
    });
  }

  function setTheme(theme){
    const isLight = theme === "light";

    document.documentElement.classList.toggle("light-mode", isLight);
    document.documentElement.classList.toggle("light", isLight);
    document.documentElement.classList.toggle("dark-mode", !isLight);
    document.documentElement.classList.toggle("dark", !isLight);

    if(document.body){
      document.body.classList.toggle("light-mode", isLight);
      document.body.classList.toggle("light", isLight);
      document.body.classList.toggle("dark-mode", !isLight);
      document.body.classList.toggle("dark", !isLight);
    }

    storeTheme(theme);
  }

  function applySavedTheme(){
    const stored = readStoredTheme();
    if(stored === "light" || stored === "dark"){
      setTheme(stored);
      return;
    }

    const body = document.body;
    const currentlyLight =
      document.documentElement.classList.contains("light-mode")
      || document.documentElement.classList.contains("light")
      || (body && (body.classList.contains("light-mode") || body.classList.contains("light")));

    setTheme(currentlyLight ? "light" : "dark");
  }

  function isThemeButton(button){
    if(!button){ return false; }

    const txt = (button.textContent || "").trim();
    const title = (button.getAttribute("title") || button.getAttribute("aria-label") || "").toLowerCase();
    const cls = button.className ? String(button.className).toLowerCase() : "";

    return (
      txt === "☀" || txt === "☾" || txt === "🌙" || txt === "☼" ||
      title.includes("light") || title.includes("dark") ||
      title.includes("lys") || title.includes("mørk") ||
      cls.includes("theme")
    );
  }

  function toggleThemeFromButton(event){
    const button = event.target.closest("button");
    if(!isThemeButton(button)){ return; }

    event.preventDefault();
    event.stopPropagation();

    const body = document.body;
    const currentlyLight =
      document.documentElement.classList.contains("light-mode")
      || document.documentElement.classList.contains("light")
      || (body && (body.classList.contains("light-mode") || body.classList.contains("light")));

    setTheme(currentlyLight ? "dark" : "light");
  }

  function getExperienceRow(target){
    if(!target || !target.closest){ return null; }

    return target.closest(
      ".item, .experience-item, .result-item, .list-item, [data-experience-id], [data-id], [role='option'], [role='listitem']"
    );
  }

  function markSelectedExperience(row){
    if(!row){ return; }

    const container =
      row.closest("#results, #list, .items, .results-panel, .list-panel, .experience-list, .result-list")
      || row.parentElement;

    if(container){
      container.querySelectorAll(".is-selected, .selected, .active, [data-selected='true'], [aria-selected='true']").forEach(el => {
        if(el === row){ return; }
        el.classList.remove("is-selected", "selected", "active");
        el.removeAttribute("data-selected");
        el.removeAttribute("aria-selected");
      });
    }

    row.classList.add("is-selected", "selected");
    row.setAttribute("data-selected", "true");
    row.setAttribute("aria-selected", "true");
  }

  function markInitialSelectedExperience(){
    const existing = document.querySelector(
      ".item.selected, .item.active, .experience-item.selected, .result-item.selected, .list-item.selected, [data-selected='true'], [aria-selected='true']"
    );
    if(existing){
      markSelectedExperience(existing);
      return;
    }

    const first = document.querySelector(".item, .experience-item, .result-item, .list-item, [data-experience-id], [role='option'], [role='listitem']");
    if(first){ markSelectedExperience(first); }
  }

  window.setOpplevelserTheme = setTheme;
  window.applyOpplevelserTheme = applySavedTheme;
  window.markSelectedExperience = markSelectedExperience;
  window.markInitialSelectedExperience = markInitialSelectedExperience;

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", () => {
      applySavedTheme();
      setTimeout(markInitialSelectedExperience, 80);
      setTimeout(markInitialSelectedExperience, 350);
    });
  }else{
    applySavedTheme();
    setTimeout(markInitialSelectedExperience, 80);
    setTimeout(markInitialSelectedExperience, 350);
  }

  document.addEventListener("click", toggleThemeFromButton, true);
  document.addEventListener("click", event => {
    const row = getExperienceRow(event.target);
    if(row){ markSelectedExperience(row); }
  }, true);
})();
</script>
