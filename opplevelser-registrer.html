<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Opplevelser - registrer v2</title>
  <style>
    :root{
      color-scheme: light dark;
      --bg:#f4f5f7;
      --card:#ffffff;
      --text:#172033;
      --muted:#5d6678;
      --border:#d8dde8;
      --accent:#2563eb;
      --danger:#b42318;
      --ok:#067647;
    }
    @media (prefers-color-scheme: dark){
      :root{ --bg:#10131a; --card:#171b24; --text:#f1f5f9; --muted:#a7b0c0; --border:#303746; --accent:#7aa2ff; }
    }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:var(--bg); color:var(--text); }
    .wrap{ max-width:920px; margin:0 auto; padding:18px; }
    .card{ background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px; box-shadow:0 10px 25px rgba(15,23,42,.08); }
    h1{ margin:0 0 4px; font-size:1.6rem; }
    .sub{ color:var(--muted); margin:0 0 18px; }
    .grid{ display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; }
    .full{ grid-column:1 / -1; }
    label{ display:block; font-weight:650; margin:0 0 6px; }
    input, textarea, select{ width:100%; min-height:44px; border:1px solid var(--border); border-radius:10px; padding:10px 12px; font:inherit; background:transparent; color:var(--text); box-sizing:border-box; }
    textarea{ min-height:110px; resize:vertical; }
    .buttons{ display:flex; flex-wrap:wrap; gap:10px; margin-top:16px; }
    button{ border:0; border-radius:999px; padding:10px 14px; font-weight:700; cursor:pointer; background:var(--accent); color:white; }
    button.secondary{ background:transparent; color:var(--text); border:1px solid var(--border); }
    button:disabled{ opacity:.6; cursor:not-allowed; }
    .status{ margin-top:14px; padding:10px 12px; border-radius:10px; border:1px solid var(--border); color:var(--muted); white-space:pre-wrap; }
    .status.ok{ color:var(--ok); }
    .status.err{ color:var(--danger); }
    .bible-card{ border:1px dashed var(--border); border-radius:12px; padding:12px; color:var(--muted); }
    .bible-card strong{ color:var(--text); }
    .small{ font-size:.92rem; color:var(--muted); }

    select{
      display:block;
      width:100%;
      min-height:44px;
      padding:0 38px 0 12px;
      border:1px solid var(--border);
      border-radius:10px;
      background:var(--card);
      color:var(--text);
      font:inherit;
      line-height:44px;
      box-sizing:border-box;
      outline:none;
    }

    select:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 2px rgba(122,162,255,.22);
    }

    select:disabled{
      opacity:.65;
      cursor:not-allowed;
    }

    select option{
      background:#242424;
      color:#ffffff;
    }



/* Opplevelser standard design v14 */
html.opplevelser-size-small{--opp-font-scale:1;}
html.opplevelser-size-medium{--opp-font-scale:1.12;}
html.opplevelser-size-large{--opp-font-scale:1.25;}

:root{
  --opp-bg:#f2f2f2;
  --opp-card:#fff;
  --opp-text:#333;
  --opp-muted:#667;
  --opp-border:#ccc;
  --opp-link:#1f789d;
  --opp-button:#fff;
  --opp-button-hover:#e9eef2;
  --opp-soft:#eaeaea;
  --opp-danger:#d77;
  --opp-success:#72c184;
}
body.dark-mode{
  --opp-bg:#151515;
  --opp-card:#242424;
  --opp-text:#eee;
  --opp-muted:#bbb;
  --opp-border:#555;
  --opp-link:#7cc7e8;
  --opp-button:#242424;
  --opp-button-hover:#3a3a3a;
  --opp-soft:#333;
}
body.light-mode{
  --opp-bg:#f2f2f2;
  --opp-card:#fff;
  --opp-text:#333;
  --opp-muted:#667;
  --opp-border:#ccc;
  --opp-link:#1f789d;
  --opp-button:#fff;
  --opp-button-hover:#e9eef2;
  --opp-soft:#eaeaea;
}
body{
  background:var(--opp-bg) !important;
  color:var(--opp-text) !important;
  font-size:calc(16px * var(--opp-font-scale, 1)) !important;
}
.wrap,.container{
  max-width:980px !important;
  margin:auto !important;
  padding:0 !important;
}
.header{
  text-align:center !important;
  margin-bottom:20px !important;
}
.site-title{
  margin:0 !important;
  font-size:30px !important;
  font-weight:800 !important;
}
.subtitle{
  margin-top:8px !important;
  color:var(--opp-muted) !important;
  font-size:16px !important;
}
.top-buttons{
  display:flex !important;
  justify-content:center !important;
  align-items:center !important;
  gap:10px !important;
  margin:14px 0 0 !important;
  flex-wrap:wrap !important;
}
.top-button{
  display:inline-flex !important;
  align-items:center !important;
  justify-content:center !important;
  width:44px !important;
  height:44px !important;
  padding:0 !important;
  background:var(--opp-card) !important;
  border:1px solid var(--opp-border) !important;
  border-radius:8px !important;
  color:var(--opp-text) !important;
  text-decoration:none !important;
  font-size:24px !important;
  font-weight:bold !important;
  line-height:1 !important;
  cursor:pointer !important;
}
.top-button:hover,
button:hover{
  background:var(--opp-button-hover) !important;
}
.top-button.app-switch-button{font-size:19px !important;}
.font-size-button{font-size:18px !important;}
.design-toggle-button{font-size:21px !important;}
.card{
  background:var(--opp-card) !important;
  border:1px solid var(--opp-border) !important;
  color:var(--opp-text) !important;
}
input,textarea,select{
  background:var(--opp-card) !important;
  color:var(--opp-text) !important;
  border:1px solid var(--opp-border) !important;
}
button,.secondary{
  background:var(--opp-button) !important;
  color:var(--opp-text) !important;
  border:1px solid var(--opp-border) !important;
}
button:not(.secondary), button.primary, .primary{
  background:var(--opp-link) !important;
  border-color:var(--opp-link) !important;
  color:#fff !important;
}
.status{color:var(--opp-muted) !important;}
.status.err,.status.error{color:var(--opp-danger) !important;}
.status.ok,.status.success{color:var(--opp-success) !important;}
.item,.details,.items,.bible{
  background:var(--opp-card) !important;
  border-color:var(--opp-border) !important;
  color:var(--opp-text) !important;
}
.item.active{
  background:rgba(124,199,232,.16) !important;
}

/* Soft design: fjern oppstreket uttrykk og bruk rolige bakgrunner, som Handleliste soft mode. */
html:not(.classic-design-root) .card,
html:not(.classic-design-root) .details,
html:not(.classic-design-root) .items,
html:not(.classic-design-root) .bible{
  border:0 !important;
  background:rgba(255,255,255,.038) !important;
  box-shadow:none !important;
}
html:not(.classic-design-root) .item,
html:not(.classic-design-root) input,
html:not(.classic-design-root) textarea,
html:not(.classic-design-root) select{
  border:0 !important;
  background:rgba(0,0,0,.18) !important;
  box-shadow:none !important;
}
html:not(.classic-design-root) .top-button,
html:not(.classic-design-root) button,
html:not(.classic-design-root) .secondary{
  border:0 !important;
  background:rgba(255,255,255,.055) !important;
  box-shadow:none !important;
}
html:not(.classic-design-root) button:not(.secondary),
html:not(.classic-design-root) button.primary,
html:not(.classic-design-root) .primary{
  background:var(--opp-link) !important;
  color:#fff !important;
}
body.light-mode html:not(.classic-design-root),
body.light-mode:not(.classic-design-root) .card{
  background:rgba(0,0,0,.035) !important;
}
@media(max-width:700px){
  body{padding:6px !important;}
  .header{margin-bottom:12px !important;}
  .site-title{font-size:28px !important;}
  .top-buttons{gap:8px !important;}
  .top-button{width:40px !important;height:40px !important;font-size:22px !important;}
}


/* Opplevelser v15 design polish */
.top-button,
html:not(.classic-design-root) .top-button,
html:not(.classic-design-root) button.top-button{
  background:rgba(255,255,255,.055) !important;
  color:var(--opp-text) !important;
  border:0 !important;
  box-shadow:none !important;
}
.top-button:hover,
html:not(.classic-design-root) .top-button:hover{
  background:rgba(255,255,255,.10) !important;
  color:var(--opp-text) !important;
}
.top-button.app-switch-button{
  font-size:28px !important;
}
.top-button.home-button{
  font-size:30px !important;
}
.top-button.font-size-button{
  font-size:18px !important;
}
.top-button.design-toggle-button{
  font-size:21px !important;
}

/* Valgt opplevelse: diskret grå utheving i stedet for blå flate */
.item.active,
html:not(.classic-design-root) .item.active{
  background:rgba(255,255,255,.085) !important;
  color:var(--opp-text) !important;
}
body.light-mode .item.active,
body.light-mode html:not(.classic-design-root) .item.active{
  background:rgba(0,0,0,.075) !important;
}

/* Bibelsted/status skal være myke flater uten linjemarkering */
html:not(.classic-design-root) .bible,
html:not(.classic-design-root) .selected-text,
html:not(.classic-design-root) .status,
html:not(.classic-design-root) .status.card,
html:not(.classic-design-root) #status{
  border:0 !important;
  background:rgba(0,0,0,.16) !important;
  box-shadow:none !important;
}
body.light-mode html:not(.classic-design-root) .bible,
body.light-mode html:not(.classic-design-root) .selected-text,
body.light-mode html:not(.classic-design-root) .status,
body.light-mode html:not(.classic-design-root) .status.card,
body.light-mode html:not(.classic-design-root) #status{
  background:rgba(0,0,0,.045) !important;
}



/* Opplevelser v19: login widget copied from Kvimarka92 index style */
.login-widget{
  position:absolute;
  top:20px;
  right:max(20px, calc((100vw - 980px) / 2));
  z-index:9999;
  height:38px;
  display:flex;
  align-items:center;
}

.login-status{
  display:flex;
  align-items:center;
  justify-content:center;
  width:38px;
  height:38px;
  min-width:38px;
  min-height:38px;
  padding:0;
  border:1px solid var(--opp-border, var(--border, #555));
  background:var(--opp-card, var(--card, #242424));
  border-radius:50%;
  color:var(--opp-muted, var(--muted, #bbb));
  text-decoration:none;
  font-size:13px;
  font-weight:bold;
  line-height:1;
  opacity:.86;
  box-sizing:border-box;
  cursor:pointer;
  white-space:nowrap;
}

.login-status:hover{
  opacity:1;
  color:var(--opp-text, var(--text, #eee));
  background-color:var(--opp-card, var(--card, #242424));
}

.login-status.is-signin{
  border:none;
  border-radius:0;
  background-color:transparent;
  background-image:url("LogInDG.png");
  background-repeat:no-repeat;
  background-position:center;
  background-size:38px 38px;
  text-indent:-9999px;
  overflow:hidden;
}

.login-menu{
  position:absolute;
  top:44px;
  right:0;
  min-width:247px;
  padding:10px;
  border:0;
  border-radius:10px;
  background:rgba(255,255,255,.06);
  color:var(--opp-text, var(--text, #eee));
  box-shadow:none;
  box-sizing:border-box;
}

html.classic-design-root .login-menu{
  border:1px solid var(--opp-border, var(--border, #555));
  background:var(--opp-card, var(--card, #242424));
  box-shadow:0 8px 24px rgba(0,0,0,.18);
}

.login-menu-name{
  font-weight:bold;
  font-size:13px;
  margin-bottom:8px;
  color:var(--opp-text, var(--text, #eee));
  white-space:nowrap;
}

.login-menu-link{
  display:block;
  padding:8px 10px;
  margin:0 -4px -4px;
  border-radius:8px;
  color:var(--opp-link, var(--link, #7cc7e8));
  text-decoration:none;
  font-weight:bold;
  font-size:13px;
}

.login-menu-link:hover{
  background:rgba(127,127,127,.10);
}

.login-menu-link:active{
  background:rgba(127,127,127,.22);
}

@media(max-width:800px){
  .login-widget{
    top:10px;
    right:10px;
  }
}


/* Opplevelser v20 voice buttons right side */
.voice-field-header{
  display:flex !important;
  align-items:center !important;
  justify-content:space-between !important;
  gap:10px !important;
  margin-bottom:6px !important;
}
.voice-field-header label{
  margin:0 !important;
}
.voice-actions{
  display:flex !important;
  align-items:center !important;
  justify-content:flex-end !important;
  gap:8px !important;
  margin-left:auto !important;
}
.clear-voice-button,
.mic-button{
  display:inline-flex !important;
  align-items:center !important;
  justify-content:center !important;
  width:36px !important;
  height:32px !important;
  min-height:32px !important;
  padding:0 !important;
  border:0 !important;
  border-radius:999px !important;
  background:rgba(255,255,255,.07) !important;
  color:var(--opp-text, #eee) !important;
  font-size:16px !important;
  font-weight:800 !important;
  line-height:1 !important;
  cursor:pointer !important;
  box-shadow:none !important;
}
.clear-voice-button:hover,
.mic-button:hover{
  background:rgba(255,255,255,.13) !important;
}
.clear-voice-button{
  font-size:19px !important;
}
.mic-button{
  display:none !important;
}
.mic-button.visible{
  display:inline-flex !important;
}
.mic-button.listening{
  background:#c2410c !important;
  color:#fff !important;
  animation:oppMicPulse 1s infinite;
}
body.light-mode .clear-voice-button,
body.light-mode .mic-button{
  background:rgba(0,0,0,.07) !important;
  color:var(--opp-text, #333) !important;
}
body.light-mode .clear-voice-button:hover,
body.light-mode .mic-button:hover{
  background:rgba(0,0,0,.13) !important;
}


/* Opplevelser v23/v17 Bible header display */
.bible-display-header{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:14px;
  margin:18px 0 8px;
  flex-wrap:wrap;
}
.bible-display-title{
  font-weight:800;
  color:var(--opp-text, #eee);
}
.bible-display-source{
  margin-left:auto;
  color:var(--opp-muted, #bbb);
  font-size:.92em;
  white-space:nowrap;
}
.bible-hidden-input{
  display:none !important;
}
@media(max-width:700px){
  .bible-display-header{
    display:block;
  }
  .bible-display-source{
    display:block;
    margin:4px 0 0;
  }
}


/* Opplevelser final icon normalization */
.top-button svg,
.mic-button svg{
  width:22px;
  height:22px;
  display:block;
  color:currentColor;
}
.mic-button svg{
  width:18px;
  height:18px;
}


/* Opplevelser v25/v19 final field polish */
.clear-voice-button{
  background:rgba(255,255,255,.075) !important;
  color:var(--opp-text, #eee) !important;
  border:0 !important;
  box-shadow:none !important;
}
.clear-voice-button:hover{
  background:rgba(255,255,255,.13) !important;
}
body.light-mode .clear-voice-button{
  background:rgba(0,0,0,.075) !important;
  color:var(--opp-text, #333) !important;
}
body.light-mode .clear-voice-button:hover{
  background:rgba(0,0,0,.13) !important;
}

.bible-click-frame{
  cursor:pointer;
  transition:background .15s ease, box-shadow .15s ease;
}
.bible-click-frame:hover{
  background:rgba(255,255,255,.075) !important;
}
body.light-mode .bible-click-frame:hover{
  background:rgba(0,0,0,.075) !important;
}
.bible-click-frame::after{
  content:"Klikk for å endre bibelsted";
  display:block;
  margin-top:6px;
  color:var(--opp-muted, #bbb);
  font-size:.86em;
  opacity:.85;
}

textarea.auto-grow-textarea{
  overflow:hidden !important;
  resize:none !important;
  min-height:88px;
}


/* Register v26: remove outer frame and neutral delete buttons */
body .wrap,
body .container,
body .card.main-card,
body .main-card,
body form.card,
body #experienceForm.card{
  border:0 !important;
  background:transparent !important;
  box-shadow:none !important;
}

body .card:first-of-type{
  border:0 !important;
  background:transparent !important;
  box-shadow:none !important;
}

.clear-voice-button,
body.dark-mode .clear-voice-button,
body.light-mode .clear-voice-button,
html:not(.classic-design-root) .clear-voice-button,
body.dark-mode html:not(.classic-design-root) .clear-voice-button,
body.light-mode html:not(.classic-design-root) .clear-voice-button{
  background:rgba(255,255,255,.075) !important;
  color:var(--opp-text, #eee) !important;
  border:0 !important;
  box-shadow:none !important;
}

.clear-voice-button:hover,
body.dark-mode .clear-voice-button:hover,
body.light-mode .clear-voice-button:hover,
html:not(.classic-design-root) .clear-voice-button:hover{
  background:rgba(255,255,255,.13) !important;
  color:var(--opp-text, #eee) !important;
}

body.light-mode .clear-voice-button,
body.light-mode html:not(.classic-design-root) .clear-voice-button{
  background:rgba(0,0,0,.075) !important;
  color:var(--opp-text, #333) !important;
}

body.light-mode .clear-voice-button:hover,
body.light-mode html:not(.classic-design-root) .clear-voice-button:hover{
  background:rgba(0,0,0,.13) !important;
  color:var(--opp-text, #333) !important;
}


/* Kvimarka92/Handleliste layout standard v27 */
body{
  background:#111 !important;
}
.header,
.header.card,
.header-panel,
.top-panel{
  border:0 !important;
  background:transparent !important;
  box-shadow:none !important;
}

.wrap,
.container{
  background:transparent !important;
  border:0 !important;
  box-shadow:none !important;
}

.site-title,
.subtitle,
.top-buttons{
  background:transparent !important;
  border:0 !important;
  box-shadow:none !important;
}

/* Natural content sections start below the header */
.content-section,
.form-section,
.search-section,
.list-section,
.detail-section,
.status-section{
  background:rgba(255,255,255,.045) !important;
  border:0 !important;
  border-radius:10px !important;
  box-shadow:none !important;
}

/* If old card class is used for content, keep it section-like, but never around header */
.card:not(.selected-card):not(.header){
  background:rgba(255,255,255,.045) !important;
  border:0 !important;
  border-radius:10px !important;
  box-shadow:none !important;
}

.status,
#status{
  background:rgba(255,255,255,.045) !important;
  border:0 !important;
  border-radius:10px !important;
  box-shadow:none !important;
}

body.light-mode .content-section,
body.light-mode .form-section,
body.light-mode .search-section,
body.light-mode .list-section,
body.light-mode .detail-section,
body.light-mode .status-section,
body.light-mode .card:not(.selected-card):not(.header),
body.light-mode .status,
body.light-mode #status{
  background:rgba(0,0,0,.045) !important;
}

.items,
.details,
#items,
#details{
  background:rgba(255,255,255,.045) !important;
  border:0 !important;
  border-radius:10px !important;
  box-shadow:none !important;
}

body.light-mode .items,
body.light-mode .details,
body.light-mode #items,
body.light-mode #details{
  background:rgba(0,0,0,.045) !important;
}

.item{
  background:rgba(0,0,0,.18) !important;
  border:0 !important;
  box-shadow:none !important;
}

.item.active{
  background:rgba(255,255,255,.095) !important;
}

body.light-mode .item{
  background:rgba(0,0,0,.035) !important;
}

body.light-mode .item.active{
  background:rgba(0,0,0,.085) !important;
}

/* Top buttons follow Handleliste look */
.top-button{
  background:rgba(255,255,255,.055) !important;
  border:0 !important;
  box-shadow:none !important;
}
.top-button:hover{
  background:rgba(255,255,255,.10) !important;
}
body.light-mode .top-button{
  background:rgba(0,0,0,.055) !important;
}
body.light-mode .top-button:hover{
  background:rgba(0,0,0,.10) !important;
}


/* v28: header area must never have a background frame */
body > .wrap,
body > .container,
.wrap,
.container,
main,
.app,
.page,
.panel,
.main,
.shell{
  background:transparent !important;
  border:0 !important;
  box-shadow:none !important;
}

/* If the first large wrapper/card contains the header, make it transparent */
body > .card:first-child,
body > .wrap > .card:first-child,
body > .container > .card:first-child,
.wrap > .card:first-child,
.container > .card:first-child{
  background:transparent !important;
  border:0 !important;
  box-shadow:none !important;
}

/* Header and all top controls stand freely */
.header,
.header *,
.site-title,
.subtitle,
.top-buttons,
.login-widget{
  box-shadow:none !important;
}
.header,
.site-title,

  <script>
    const API_BASE = window.OPPLEVELSER_API_BASE || (
      location.hostname === "kvimarka92.carstereogarage.com" || location.hostname === "www.kvimarka92.carstereogarage.com"
        ? ""
        : "https://api-kvimarka92.carstereogarage.com"
    );

    const BIBLE_SEARCH_URL = window.OPPLEVELSER_BIBLE_SEARCH_URL || "./bibel-sok.html";
    const SELECTED_VERSE_KEY = "kvimarka92SelectedBibleVerse";

    const el = id => document.getElementById(id);
    const statusEl = el("status");
    const form = el("experienceForm");

    function setStatus(text, kind){
      statusEl.textContent = text;
      statusEl.className = "status" + (kind ? " " + kind : "");
    }

    async function apiFetch(path, options){
      const safeOptions = options || {};
      const method = String(safeOptions.method || "GET").toUpperCase();
      const headers = {
        ...(safeOptions.headers || {})
      };

      // Ikke sett Content-Type på GET. Da unngår vi CORS preflight mot Cloudflare Access.
      // For POST bruker vi text/plain, samme mønster som flere eksisterende Kvimarka92-sider,
      // slik at nettleseren ikke sender OPTIONS-preflight før selve API-kallet.
      if(method !== "GET" && safeOptions.body !== undefined && !headers["Content-Type"]){
        headers["Content-Type"] = "text/plain;charset=UTF-8";
      }

      const res = await fetch(API_BASE + path, {
        credentials:"include",
        ...safeOptions,
        method,
        headers
      });

      const data = await res.json().catch(() => ({}));

      if(!res.ok){
        throw new Error(data.detail || data.error || `HTTP ${res.status}`);
      }

      return data;
    }

    function fillDatalist(id, items, getName){
      const list = el(id);
      if(!list) return;
      list.innerHTML = "";

      (items || []).forEach(item => {
        const name = getName ? getName(item) : item.name;
        if(!name) return;
        const option = document.createElement("option");
        option.value = name;
        list.appendChild(option);
      });
    }

    function fillSelect(id, items){
      const select = el(id);
      if(!select) return;
      const currentValue = select.value;
      const names = [];

      (items || []).forEach(item => {
        const text = String((item && (item.name || item.environmentName || item.value)) || item || "").trim();
        if(text && !names.includes(text)) names.push(text);
      });

      select.innerHTML = "";

      const emptyOption = document.createElement("option");
      emptyOption.value = "";
      emptyOption.textContent = names.length ? "Velg miljø" : "Ingen miljøvalg funnet";
      select.appendChild(emptyOption);

      names.forEach(name => {
        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        select.appendChild(option);
      });

      select.disabled = names.length === 0;

      if(currentValue && names.includes(currentValue)){
        select.value = currentValue;
      }
    }

    function setBibleVerse(verse){
      const reference = (verse && verse.reference || "").trim();
      const text = (verse && verse.text || "").trim();
      const source = (verse && verse.source || "Bibelen på Norsk (1930)").trim();

      const referenceField = el("bibleReference");
      const textField = el("bibleText");
      const sourceField = el("bibleSource");

      if(referenceField) referenceField.value = reference;
      if(textField){
        textField.value = text;
        textField.dispatchEvent(new Event("input", { bubbles:true }));
        textField.dispatchEvent(new Event("change", { bubbles:true }));
      }
      if(sourceField) sourceField.value = source;

      const oldBibleCard = el("bibleCard");
      if(oldBibleCard){
        if(reference || text){
          oldBibleCard.innerHTML = `<strong>${escapeHtml(reference || "Valgt bibelsted")}</strong><br>${escapeHtml(text)}<br><span class="small">${escapeHtml(source)}</span>`;
        }else{
          oldBibleCard.textContent = "Ingen bibelreferanse valgt ennå.";
        }
      }

      if(window.updateRegisterBibleHeader){
        window.updateRegisterBibleHeader();
      }
      if(window.ensureRegisterBibleTextLink){
        window.ensureRegisterBibleTextLink();
      }
      if(textField && window.autoGrowOpplevelserTextarea){
        window.autoGrowOpplevelserTextarea(textField);
      }
    }

    function escapeHtml(value){
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function readSelectedBibleVerseFromStorage(){
      const raw = localStorage.getItem(SELECTED_VERSE_KEY) || sessionStorage.getItem(SELECTED_VERSE_KEY);
      if(!raw) return null;
      try{ return JSON.parse(raw); }catch(error){ return null; }
    }

    function pollSelectedBibleVerseForAWhile(){
      let count = 0;
      const timer = setInterval(() => {
        count += 1;
        const verse = readSelectedBibleVerseFromStorage();
        if(verse && (verse.reference || verse.text)){
          setBibleVerse(verse);
          setStatus("Bibelsted valgt: " + (verse.reference || ""), "ok");
          clearInterval(timer);
        }
        if(count > 120){
          clearInterval(timer);
        }
      }, 1000);
    }

    window.addEventListener("message", event => {
      const data = event.data || {};
      if(data.type === "kvimarka92:bible-verse-selected"){
        setBibleVerse(data.payload || data.verse || data);
        setStatus("Bibelsted valgt.", "ok");
      }
    });

    const legacyFindBibleBtn = el("findBibleBtn");
    if(legacyFindBibleBtn){
      legacyFindBibleBtn.addEventListener("click", () => {
        window.open(BIBLE_SEARCH_URL, "kvimarka92BibleSearch", "width=980,height=760");
        pollSelectedBibleVerseForAWhile();
      });
    }

    const legacyClearBibleBtn = el("clearBibleBtn");
    if(legacyClearBibleBtn){
      legacyClearBibleBtn.addEventListener("click", () => {
        setBibleVerse(null);
        localStorage.removeItem(SELECTED_VERSE_KEY);
        sessionStorage.removeItem(SELECTED_VERSE_KEY);
        setStatus("Bibelsted fjernet.");
      });
    }

    el("resetBtn").addEventListener("click", () => {
      form.reset();
      setBibleVerse(null);
      initDate();
      setStatus("Skjema tømt.");
    });

    function initDate(defaultDate){
      const value = defaultDate || new Date().toISOString().slice(0, 10);
      const dateInput = el("experienceDate");

      if(window.setOpplevelserRegisterDateValue){
        window.setOpplevelserRegisterDateValue(value);
      }else{
        dateInput.value = value;
      }
    }

    async function loadOptions(){
      try{
        const data = await apiFetch("/experience-options", { method:"GET" });
        initDate(data.today);
        fillDatalist("placesList", data.places || []);
        const environmentOptions = data.environmentOptions || [];
        fillSelect("environment", environmentOptions);

        if(!environmentOptions.length){
          setStatus("Miljøvalg mangler: Worker returnerte ingen Baserow-options for Experiences → Environment.", "err");
        }
        setupOpplevelserLoginWidget(data.user);
      el("userLine").textContent = "";

        const storedVerse = readSelectedBibleVerseFromStorage();
        if(storedVerse && (storedVerse.reference || storedVerse.text)){
          setBibleVerse(storedVerse);
        }

        setStatus("Klar.");
      }catch(error){
        const envSelect = el("environment");
        if(envSelect){
          envSelect.innerHTML = '<option value="">Kunne ikke hente miljøvalg</option>';
          envSelect.disabled = true;
        }
        setStatus("Kunne ikke laste Opplevelser: " + error.message, "err");
      }
    }

    form.addEventListener("submit", async event => {
      event.preventDefault();
      el("saveBtn").disabled = true;
      setStatus("Lagrer ...");

      const payload = {
        experienceDate:parseOpplevelserDate(el("experienceDate").value),
        heading:el("heading").value,
        place:el("place").value,
        environment:el("environment").value,
        occasion:el("occasion").value,
        experience:el("experience").value,
        bibleReference:el("bibleReference").value,
        bibleText:el("bibleText").value,
        bibleSource:el("bibleSource").value,
        consequence:el("consequence").value,
        note:el("note").value

<script>
(function(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let activeRecognition = null;
  let activeButton = null;
  let activeTextarea = null;
  let baseText = "";

  function setVoiceStatus(text){
    let status = document.getElementById("voiceStatus");

    if(!status){
      status = document.createElement("div");
      status.id = "voiceStatus";
      status.className = "voice-status";
      const firstMic = document.querySelector(".mic-button");
      if(firstMic && firstMic.closest(".voice-field-wrap")){
        firstMic.closest(".voice-field-wrap").appendChild(status);
      }else{
        document.body.appendChild(status);
      }
    }

    status.textContent = text || "";
    status.classList.toggle("visible", !!text);
  }

  function stopActiveRecognition(){
    if(activeRecognition){
      try{ activeRecognition.stop(); }catch(error){}
    }

    if(activeButton){
      activeButton.classList.remove("listening");
      activeButton.title = "Les inn tekst";
      activeButton.setAttribute("aria-label", "Les inn tekst");
    }

    activeRecognition = null;
    activeButton = null;
    activeTextarea = null;
    baseText = "";
    setVoiceStatus("");
  }

  function appendTranscript(textarea, originalText, transcript){
    const spoken = String(transcript || "").trim();

    if(!spoken){
      return;
    }

    const before = String(originalText || "").trim();

    if(before){
      textarea.value = before + (/[.!?…]$/.test(before) ? " " : ". ") + spoken;
    }else{
      textarea.value = spoken;
    }

    textarea.dispatchEvent(new Event("input", { bubbles:true }));
    textarea.dispatchEvent(new Event("change", { bubbles:true }));
  }

  function startDictation(button, textareaId){
    const textarea = document.getElementById(textareaId);

    if(!textarea){
      alert("Fant ikke tekstfeltet.");
      return;
    }

    if(!SpeechRecognition){
      alert("Talegjenkjenning støttes ikke i denne nettleseren.");
      return;
    }

    if(activeRecognition && activeButton === button){
      stopActiveRecognition();
      return;
    }

    stopActiveRecognition();

    const recognition = new SpeechRecognition();
    recognition.lang = "nb-NO";
    recognition.interimResults = true;
    recognition.continuous = true;

    activeRecognition = recognition;
    activeButton = button;
    activeTextarea = textarea;
    baseText = textarea.value;

    button.classList.add("listening");
    button.title = "Stopp innlesing";
    button.setAttribute("aria-label", "Stopp innlesing");
    setVoiceStatus("Lytter ... trykk mikrofonen igjen for å stoppe.");

    let finalTranscript = "";

    recognition.onresult = event => {
      let interim = "";

      for(let index = event.resultIndex; index < event.results.length; index += 1){
        const result = event.results[index];
        const transcript = result[0] && result[0].transcript ? result[0].transcript : "";

        if(result.isFinal){
          finalTranscript += transcript + " ";
        }else{
          interim += transcript;
        }
      }

      const preview = (finalTranscript + " " + interim).trim();

      if(preview){
        appendTranscript(textarea, baseText, preview);
      }
    };

    recognition.onerror = event => {
      setVoiceStatus("Mikrofonfeil: " + (event.error || "ukjent feil"));
      window.setTimeout(stopActiveRecognition, 1200);
    };

    recognition.onend = () => {
      if(activeRecognition === recognition){
        stopActiveRecognition();
      }
    };

    try{
      recognition.start();
    }catch(error){
      setVoiceStatus("Kunne ikke starte mikrofon: " + error.message);
      stopActiveRecognition();
    }
  }

  function initMicButtons(){
    const buttons = document.querySelectorAll("[data-dictate-target]");

    buttons.forEach(button => {
      if(SpeechRecognition){
        button.classList.add("visible");
      }else{
        button.classList.remove("visible");
      }

      if(button.dataset.dictateReady === "1"){
        return;
      }

      button.dataset.dictateReady = "1";
      button.addEventListener("click", () => {
        startDictation(button, button.dataset.dictateTarget);
      });
    });
  }

  window.initOpplevelserMicButtons = initMicButtons;

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", initMicButtons);
  }else{
    initMicButtons();
  }
})();
</script>


<script>
(function(){
  const LOGIN_API_BASE = "https://api-kvimarka92.carstereogarage.com";

  function getInitials(nameOrEmail){
    const value = String(nameOrEmail || "").trim();

    if(!value){
      return "?";
    }

    const namePart = value.includes("@")
      ? value.split("@")[0]
      : value;

    const parts = namePart
      .split(/\s+/)
      .filter(Boolean);

    if(parts.length >= 2){
      return (parts[0][0] + parts[1][0]).toUpperCase();
    }

    return namePart.slice(0, 2).toUpperCase();
  }

  async function performOpplevelserLogout(){
    try{
      await fetch(`${LOGIN_API_BASE}/cdn-cgi/access/logout`, {
        method:"GET",
        credentials:"include",
        mode:"no-cors"
      });
    }catch(error){
      console.warn("Logout request may have been blocked, continuing anyway.", error);
    }

    window.location.href = window.location.pathname + "?logout=" + Date.now();
  }

  window.setupOpplevelserLoginWidget = function(user){
    const loginStatus = document.getElementById("loginStatus");
    const loginMenu = document.getElementById("loginMenu");
    const loginMenuName = document.getElementById("loginMenuName");
    const logoutLink = document.getElementById("logoutLink");

    if(!loginStatus || !loginMenu){
      return;
    }

    if(user && (user.name || user.email)){
      const displayName = user.name || user.email || "Innlogget";

      loginStatus.textContent = getInitials(displayName);
      loginStatus.href = "#";
      loginStatus.classList.remove("is-signin");
      loginStatus.classList.add("signed-in");
      loginStatus.title = displayName;
      loginStatus.setAttribute("aria-label", displayName);

      if(loginMenuName){
        loginMenuName.textContent = displayName;
      }

      loginStatus.onclick = function(event){
        event.preventDefault();
        loginMenu.style.display =
          loginMenu.style.display === "block" ? "none" : "block";
      };

      if(logoutLink){
        logoutLink.onclick = function(event){
          event.preventDefault();
          performOpplevelserLogout();
        };
      }
    }else{
      const returnUrl =
        window.location.origin +
        window.location.pathname +
        window.location.search;

      loginStatus.textContent = "Sign in";
      loginStatus.href =
        `${LOGIN_API_BASE}/login?returnUrl=${encodeURIComponent(returnUrl)}`;

      loginStatus.classList.add("is-signin");
      loginStatus.classList.remove("signed-in");
      loginStatus.title = "Logg inn";
      loginStatus.setAttribute("aria-label", "Logg inn");
      loginStatus.onclick = null;
      loginMenu.style.display = "none";
    }
  };

  document.addEventListener("click", function(event){
    const widget = document.querySelector(".login-widget");
    const menu = document.getElementById("loginMenu");

    if(widget && menu && !widget.contains(event.target)){
      menu.style.display = "none";
    }
  });

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", function(){
      window.setupOpplevelserLoginWidget(null);
    });
  }else{
    window.setupOpplevelserLoginWidget(null);
  }
})();
</script>

<script>
(function(){
  const KEY = "kvimarka92SelectedBibleVerse";
  const OVERRIDE_KEY = "kvimarka92BibleSearchInputVerse";

  function readField(id){
    const el = document.getElementById(id);
    return el ? String(el.value || "").trim() : "";
  }

  function getCurrentBibleVerseFromPage(){
    const reference =
      readField("bibleReference") ||
      readField("editBibleReference");

    const text =
      readField("bibleText") ||
      readField("editBibleText");

    const source =
      readField("bibleSource") ||
      readField("editBibleSource") ||
      "Bibelen på Norsk (1930)";

    return {
      reference,
      text,
      source,
      sourceId:"nb-1930",
      selectedAt:new Date().toISOString()
    };
  }

  function prepareBibleSearchFromCurrentPage(){
    const verse = getCurrentBibleVerseFromPage();

    try{
      sessionStorage.setItem(OVERRIDE_KEY, JSON.stringify(verse));
      sessionStorage.setItem(KEY, JSON.stringify(verse));

      // localStorage oppdateres også slik at nytt popup-vindu kan lese samme verdi.
      // Men sessionStorage override er fasit for akkurat denne åpningen.
      localStorage.setItem(OVERRIDE_KEY, JSON.stringify(verse));
      localStorage.setItem(KEY, JSON.stringify(verse));
    }catch(error){}

    return verse;
  }

  function applySelectedBibleVerseToPage(verse){
    if(!verse){
      return;
    }

    const normalRef = document.getElementById("bibleReference");
    const normalText = document.getElementById("bibleText");
    const normalSource = document.getElementById("bibleSource");

    const editRef = document.getElementById("editBibleReference");
    const editText = document.getElementById("editBibleText");
    const editSource = document.getElementById("editBibleSource");

    if(normalRef) normalRef.value = verse.reference || "";
    if(normalText) normalText.value = verse.text || "";
    if(normalSource) normalSource.value = verse.source || "Bibelen på Norsk (1930)";

    if(editRef) editRef.value = verse.reference || "";
    if(editText) editText.value = verse.text || "";
    if(editSource) editSource.value = verse.source || "Bibelen på Norsk (1930)";

    if(typeof window.updateBiblePreview === "function"){
      window.updateBiblePreview();
      if(window.updateBibleHeaderDisplay){ window.updateBibleHeaderDisplay(); }
    }

    for(const id of ["bibleReference","bibleText","bibleSource","editBibleReference","editBibleText","editBibleSource"]){
      const field = document.getElementById(id);
      if(field){
        field.dispatchEvent(new Event("input", { bubbles:true }));
        field.dispatchEvent(new Event("change", { bubbles:true }));
      }
    }

    try{
      sessionStorage.setItem(KEY, JSON.stringify(verse));
      sessionStorage.setItem(OVERRIDE_KEY, JSON.stringify(verse));
      localStorage.setItem(KEY, JSON.stringify(verse));
      localStorage.setItem(OVERRIDE_KEY, JSON.stringify(verse));
    }catch(error){}
  }

  window.prepareBibleSearchFromCurrentPage = prepareBibleSearchFromCurrentPage;
  window.applySelectedBibleVerseToPage = applySelectedBibleVerseToPage;

  window.addEventListener("message", event => {
    if(!event.data || event.data.type !== "kvimarka92:bible-verse-selected"){
      return;
    }

    applySelectedBibleVerseToPage(event.data.payload);
  });
})();
</script>

<script>
(function(){
  function pad2(value){
    return String(value).padStart(2, "0");
  }

  function isoToNorwegianDate(value){
    const text = String(value || "").trim();

    const iso = text.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if(iso){
      return iso[3] + "." + iso[2] + "." + iso[1];
    }

    const no = text.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
    if(no){
      return pad2(no[1]) + "." + pad2(no[2]) + "." + no[3];
    }

    const us = text.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if(us){
      return pad2(us[2]) + "." + pad2(us[1]) + "." + us[3];
    }

    return text;
  }

  function norwegianDateToIso(value){
    const text = String(value || "").trim();

    const no = text.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
    if(no){
      return no[3] + "-" + pad2(no[2]) + "-" + pad2(no[1]);
    }

    const iso = text.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if(iso){
      return iso[1] + "-" + iso[2] + "-" + iso[3];
    }

    const us = text.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if(us){
      return us[3] + "-" + pad2(us[1]) + "-" + pad2(us[2]);
    }

    return "";
  }

  function todayIso(){
    const now = new Date();
    return now.getFullYear() + "-" + pad2(now.getMonth() + 1) + "-" + pad2(now.getDate());
  }

  function isMobileDateEnvironment(){
    return (
      window.matchMedia("(pointer: coarse)").matches ||
      window.matchMedia("(max-width: 700px)").matches ||
      /iPad|iPhone|iPod|Android/i.test(navigator.userAgent)
    );
  }

  window.formatOpplevelserDate = isoToNorwegianDate;
  window.parseOpplevelserDate = function(value){
    return norwegianDateToIso(value) || String(value || "").trim();
  };

  function getIsoFromInput(input){
    if(!input){
      return "";
    }

    return norwegianDateToIso(input.value) || input.dataset.mobileIsoDate || "";
  }

  function setRegisterDateValue(value){
    const input = document.getElementById("experienceDate");
    const picker = document.getElementById("experienceDatePicker");

    if(!input){
      return;
    }

    const iso = norwegianDateToIso(value) || todayIso();

    if(isMobileDateEnvironment()){
      // iOS/Safari må beholde ekte type=date og ISO-verdi. Ikke skriv DD.MM.YYYY til dette feltet.
      input.type = "date";
      input.value = iso;
      input.dataset.mobileIsoDate = iso;
      input.removeAttribute("readonly");
      input.removeAttribute("onclick");
      input.onclick = null;
      input.placeholder = "";
      input.inputMode = "";
      input.autocomplete = "off";

      if(picker){
        picker.value = iso;
      }

      return;
    }

    // PC: vis norsk dato i tekstfelt, men lagre/submit konverterer tilbake til ISO.
    input.type = "text";
    input.value = isoToNorwegianDate(iso);
    input.placeholder = "dd.mm.åååå";
    input.inputMode = "numeric";
    input.autocomplete = "off";
    input.setAttribute("readonly", "readonly");

    if(picker){
      picker.value = iso;
    }
  }

  function syncDatePickerFromText(){
    const input = document.getElementById("experienceDate");
    const picker = document.getElementById("experienceDatePicker");

    if(!input || !picker){
      return;
    }

    const iso = getIsoFromInput(input);
    if(/^\d{4}-\d{2}-\d{2}$/.test(iso)){
      picker.value = iso;
    }
  }

  window.setOpplevelserRegisterDateValue = setRegisterDateValue;

  window.forceNorwegianRegisterDate = function(){
    if(isMobileDateEnvironment()){
      const input = document.getElementById("experienceDate");
      setRegisterDateValue(getIsoFromInput(input) || todayIso());
      return;
    }

    const input = document.getElementById("experienceDate");
    setRegisterDateValue(getIsoFromInput(input) || todayIso());
  };

  window.openExperienceDatePicker = function(){
    const input = document.getElementById("experienceDate");
    const picker = document.getElementById("experienceDatePicker");

    if(!input){
      return;
    }

    if(isMobileDateEnvironment()){
      input.type = "date";
      input.removeAttribute("readonly");
      try{
        input.showPicker();
      }catch(error){
        input.focus();
      }
      return;
    }

    syncDatePickerFromText();

    if(!picker){
      return;
    }

    try{
      picker.showPicker();
    }catch(error){
      picker.focus();
      picker.click();
    }
  };

  function installDatePicker(){
    const input = document.getElementById("experienceDate");
    const picker = document.getElementById("experienceDatePicker");

    if(!input){
      return;
    }

    setRegisterDateValue(getIsoFromInput(input) || todayIso());

    if(input.dataset.datePickerReady !== "1"){
      input.dataset.datePickerReady = "1";

      input.addEventListener("change", function(){
        const iso = norwegianDateToIso(input.value);

        if(isMobileDateEnvironment()){
          if(/^\d{4}-\d{2}-\d{2}$/.test(iso)){
            input.dataset.mobileIsoDate = iso;
            input.value = iso;
            if(picker){
              picker.value = iso;
            }
          }
          return;
        }

        syncDatePickerFromText();
      });

      input.addEventListener("input", function(){
        if(!isMobileDateEnvironment()){
          return;
        }

        const iso = norwegianDateToIso(input.value);
        if(/^\d{4}-\d{2}-\d{2}$/.test(iso)){
          input.dataset.mobileIsoDate = iso;
          if(picker){
            picker.value = iso;
          }
        }
      });

      input.addEventListener("blur", function(){
        if(isMobileDateEnvironment()){
          // Kritisk: ikke konverter type=date til DD.MM.YYYY på iOS/Safari.
          const iso = norwegianDateToIso(input.value) || input.dataset.mobileIsoDate;
          if(/^\d{4}-\d{2}-\d{2}$/.test(iso)){
            input.value = iso;
            input.dataset.mobileIsoDate = iso;
          }
          return;
        }

        setRegisterDateValue(getIsoFromInput(input) || todayIso());
      });
    }

    if(picker && picker.dataset.datePickerReady !== "1"){
      picker.dataset.datePickerReady = "1";
      picker.addEventListener("change", function(){
        if(picker.value){
          setRegisterDateValue(picker.value);
        }
      });
    }

    input.onclick = function(){
      if(typeof window.openExperienceDatePicker === "function"){
        window.openExperienceDatePicker();
      }
    };
  }

  window.installExperienceDatePicker = installDatePicker;

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", installDatePicker);
  }else{
    installDatePicker();
  }

  window.addEventListener("pageshow", installDatePicker);
  window.addEventListener("resize", function(){
    setTimeout(installDatePicker, 100);
  });
})();
</script>



<script>
(function(){
  const THEME_KEYS = ["kvimarka92Theme", "opplevelserTheme", "theme"];

  function readStoredTheme(){
    for(const key of THEME_KEYS){
      try{
        const value = localStorage.getItem(key);
        if(value === "light" || value === "dark"){
          return value;
        }
      }catch(error){}
    }

    return "";
  }

  function storeTheme(theme){
    THEME_KEYS.forEach(key => {
      try{
        localStorage.setItem(key, theme);
      }catch(error){}
    });
  }

  function setTheme(theme){
    const isLight = theme === "light";

    document.documentElement.classList.toggle("light-mode", isLight);
    document.documentElement.classList.toggle("light", isLight);
    document.documentElement.classList.toggle("dark-mode", !isLight);
    document.documentElement.classList.toggle("dark", !isLight);

    if(document.body){
      document.body.classList.toggle("light-mode", isLight);
      document.body.classList.toggle("light", isLight);
      document.body.classList.toggle("dark-mode", !isLight);
      document.body.classList.toggle("dark", !isLight);
    }

    storeTheme(theme);
  }

  function applySavedTheme(){
    const stored = readStoredTheme();
    if(stored === "light" || stored === "dark"){
      setTheme(stored);
      return;
    }

    const body = document.body;
    const currentlyLight =
      document.documentElement.classList.contains("light-mode")
      || document.documentElement.classList.contains("light")
      || (body && (body.classList.contains("light-mode") || body.classList.contains("light")));

    setTheme(currentlyLight ? "light" : "dark");
  }

  function isThemeButton(button){
    if(!button){
      return false;
    }

    const txt = (button.textContent || "").trim();
    const title = (button.getAttribute("title") || button.getAttribute("aria-label") || "").toLowerCase();
    const cls = button.className ? String(button.className).toLowerCase() : "";

    return (
      txt === "☀" || txt === "☾" || txt === "🌙" || txt === "☼" ||
      title.includes("light") || title.includes("dark") ||
      title.includes("lys") || title.includes("mørk") ||
      cls.includes("theme")
    );
  }

  function toggleThemeFromButton(event){
    const button = event.target.closest("button");
    if(!isThemeButton(button)){
      return;
    }

    event.preventDefault();
    event.stopPropagation();

    const body = document.body;
    const currentlyLight =
      document.documentElement.classList.contains("light-mode")
      || document.documentElement.classList.contains("light")
      || (body && (body.classList.contains("light-mode") || body.classList.contains("light")));

    setTheme(currentlyLight ? "dark" : "light");
  }

  window.applyRealRegisterTheme = applySavedTheme;
  window.setOpplevelserTheme = setTheme;

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", applySavedTheme);
  }else{
    applySavedTheme();
  }

  document.addEventListener("click", toggleThemeFromButton, true);
})();
</script>

      const symbol = isLight ? "☾" : "☀︎";

      button.setAttribute("title", isLight ? "Bytt til mørk modus" : "Bytt til lys modus");
      button.setAttribute("aria-label", isLight ? "Bytt til mørk modus" : "Bytt til lys modus");
      button.classList.add("theme-button");
    });
  }

  function pad2(value){
    return String(value).padStart(2, "0");
  }

  function noToIso(value){
    const text = String(value || "").trim();

    const no = text.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
    if(no){
      return no[3] + "-" + pad2(no[2]) + "-" + pad2(no[1]);
    }

    const iso = text.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if(iso){
      return iso[1] + "-" + iso[2] + "-" + iso[3];
    }

    return text;
  }

  function isoToNo(value){
    const text = String(value || "").trim();

    const iso = text.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if(iso){
      return iso[3] + "." + iso[2] + "." + iso[1];
    }

    return text;
  }

  function isMobileDateEnvironment(){
    return (
      window.matchMedia("(pointer: coarse)").matches ||
      window.matchMedia("(max-width: 700px)").matches ||
      /iPad|iPhone|iPod|Android/i.test(navigator.userAgent)
    );
  }

  function patchMobileDate(){
    const el = document.getElementById("experienceDate");
    if(!el){ return; }

    if(isMobileDateEnvironment()){
      const iso = noToIso(el.value);
      el.type = "date";
      if(/^\d{4}-\d{2}-\d{2}$/.test(iso)){
        el.value = iso;
      }
      el.removeAttribute("readonly");
      el.onclick = null;
      return;
    }

    el.type = "text";
    if(el.value){
      el.value = isoToNo(el.value);
    }
  }

  function markClearFormButton(){
    document.querySelectorAll("button").forEach(button => {
      if((button.textContent || "").trim() === "Tøm skjema"){
        button.classList.add("opplevelser-clear-form-final");
      }
    });
  }

  function run(){
    updateThemeIcon();
    patchMobileDate();
    markClearFormButton();
  }

  window.updateOpplevelserThemeIcon = updateThemeIcon;
  window.patchOpplevelserMobileDates = patchMobileDate;

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", run);
  }else{
    run();
  }

  window.addEventListener("pageshow", run);
  window.addEventListener("resize", () => setTimeout(run, 100));

  document.addEventListener("click", event => {
    if(isThemeButton(event.target.closest("button"))){
      setTimeout(updateThemeIcon, 0);
      setTimeout(updateThemeIcon, 80);
      setTimeout(updateThemeIcon, 250);
    }
    setTimeout(markClearFormButton, 50);
    setTimeout(patchMobileDate, 50);
  }, true);

  [100, 400, 900].forEach(delay => setTimeout(run, delay));
})();
</script>

<script>
/* Register v44c: safe direct button backgrounds
   No MutationObserver. No class mutations. Limited timers only. */
(function(){
  function isLightMode(){
    return (
      document.body.classList.contains("light-mode") ||
      document.body.classList.contains("light") ||
      document.documentElement.classList.contains("light-mode") ||
      document.documentElement.classList.contains("light")
    );
  }

  function setImportant(el, prop, value){
    el.style.setProperty(prop, value, "important");
  }

  function textOf(button){
    return (button.textContent || "").trim();
  }

  function attr(button, name){
    return (button.getAttribute(name) || "").trim().toLowerCase();
  }

  function classText(button){
    return button.className ? String(button.className).toLowerCase() : "";
  }

  function isDeleteButton(button){
    const txt = textOf(button).toLowerCase();
    const title = attr(button, "title");
    const aria = attr(button, "aria-label");
    const cls = classText(button);

    return (
      txt === "×" ||
      txt === "x" ||
      title === "tøm felt" ||
      aria === "tøm felt" ||
      title === "fjern bibelsted" ||
      aria === "fjern bibelsted" ||
      cls.includes("clear-voice") ||
      cls.includes("voice-clear") ||
      cls.includes("bible-clear")
    );
  }

  function isClearFormButton(button){
    return textOf(button) === "Tøm skjema";
  }

  function isBlueAction(button){
    const txt = textOf(button);
    const title = attr(button, "title");
    const aria = attr(button, "aria-label");
    const cls = classText(button);
    const id = (button.id || "").toLowerCase();

    return (
      txt === "Lagre opplevelse" ||
      id === "savebtn" ||
      id === "savebutton" ||
      cls.includes("voice-mic") ||
      cls.includes("mic-button") ||
      cls.includes("bible-edit") ||
      title.includes("mikrofon") ||
      aria.includes("mikrofon") ||
      title.includes("endre bibelsted") ||
      aria.includes("endre bibelsted")
    );
  }

  function styleSmallGrey(button){
    button.setAttribute("data-opp-grey-button", "1");
    setImportant(button, "display", "inline-flex");
    setImportant(button, "align-items", "center");
    setImportant(button, "justify-content", "center");
    setImportant(button, "width", "32px");
    setImportant(button, "height", "32px");
    setImportant(button, "min-width", "32px");
    setImportant(button, "min-height", "32px");
    setImportant(button, "padding", "0");
    setImportant(button, "border-radius", "999px");
    setImportant(button, "background", "#e5e7eb");
    setImportant(button, "color", "#111827");
    setImportant(button, "border", "0");
    setImportant(button, "box-shadow", "none");
    setImportant(button, "opacity", "1");
    setImportant(button, "filter", "none");
    setImportant(button, "font-weight", "800");
  }

  function stylePillGrey(button){
    button.setAttribute("data-opp-grey-button", "1");
    setImportant(button, "display", "inline-flex");
    setImportant(button, "align-items", "center");
    setImportant(button, "justify-content", "center");
    setImportant(button, "min-height", "34px");
    setImportant(button, "padding", "8px 18px");
    setImportant(button, "border-radius", "999px");
    setImportant(button, "background", "#e5e7eb");
    setImportant(button, "color", "#111827");
    setImportant(button, "border", "0");
    setImportant(button, "box-shadow", "none");
    setImportant(button, "opacity", "1");
    setImportant(button, "filter", "none");
    setImportant(button, "font-weight", "800");
  }

  function styleBlue(button){
    button.setAttribute("data-opp-blue-button", "1");
    setImportant(button, "background", "#0ea5d4");
    setImportant(button, "color", "#ffffff");
    setImportant(button, "border", "0");
    setImportant(button, "box-shadow", "none");
    setImportant(button, "opacity", "1");
    setImportant(button, "filter", "none");
  }

  function applyButtonBackgrounds(){
    if(!isLightMode()){
      return;
    }

    document.querySelectorAll("button").forEach(button => {
      if(isDeleteButton(button)){
        styleSmallGrey(button);
        return;
      }

      if(isClearFormButton(button)){
        stylePillGrey(button);
        return;
      }

      if(isBlueAction(button)){
        styleBlue(button);
      }
    });
  }

  window.fixOpplevelserRegisterButtonBackgrounds = applyButtonBackgrounds;

  function runSeveralTimes(){
    applyButtonBackgrounds();
    [50, 150, 350, 700, 1200, 2000].forEach(delay => {
      setTimeout(applyButtonBackgrounds, delay);
    });
  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", runSeveralTimes);
  }else{
    runSeveralTimes();
  }

  window.addEventListener("pageshow", runSeveralTimes);

  document.addEventListener("click", function(){
    setTimeout(applyButtonBackgrounds, 0);
    setTimeout(applyButtonBackgrounds, 120);
  }, true);
})();
</script>


<script>
/* Register v44d: stable mobile date and environment options fallback */
(function(){
  function pad2(value){
    return String(value).padStart(2, "0");
  }

  function noToIso(value){
    const text = String(value || "").trim();

    const no = text.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
    if(no){
      return no[3] + "-" + pad2(no[2]) + "-" + pad2(no[1]);
    }

    const iso = text.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if(iso){
      return iso[1] + "-" + iso[2] + "-" + iso[3];
    }

    return "";
  }

  function isoToNo(value){
    const text = String(value || "").trim();
    const iso = text.match(/^(\d{4})-(\d{2})-(\d{2})/);

    if(iso){
      return iso[3] + "." + iso[2] + "." + iso[1];
    }

    return text;
  }

  function todayIso(){
    const now = new Date();
    return now.getFullYear() + "-" + pad2(now.getMonth() + 1) + "-" + pad2(now.getDate());
  }

  function isMobileDateEnvironment(){
    return (
      window.matchMedia("(pointer: coarse)").matches ||
      window.matchMedia("(max-width: 700px)").matches ||
      /iPad|iPhone|iPod|Android/i.test(navigator.userAgent)
    );
  }

  function stabilizeMobileDate(){
    if(typeof window.installExperienceDatePicker === "function"){
      window.installExperienceDatePicker();
    }
  }

  function getEnvironmentSelect(){
    return (
      document.getElementById("environment") ||
      document.getElementById("environmentSelect") ||
      document.getElementById("miljo") ||
      document.getElementById("miljø") ||
      document.querySelector('select[name="environment"]') ||
      document.querySelector('select[name="miljo"]') ||
      document.querySelector('select[name="miljø"]')
    );
  }

  function hasRealEnvironmentOptions(select){
    if(!select){
      return false;
    }

    return Array.from(select.options || []).some(option => {
      const value = String(option.value || "").trim();
      const text = String(option.textContent || "").trim();
      return value && !/laster|velg/i.test(text);
    });
  }

  function addFallbackEnvironmentOptions(select){
    if(!select || hasRealEnvironmentOptions(select)){
      return;
    }

    const current = select.value || "";
    const labels = ["Hjemme", "Jobb", "Naturen", "Kirke", "Familie", "Annet"];

    // Keep first placeholder option, remove duplicate fallback options from earlier attempts.
    Array.from(select.options || []).forEach(option => {
      if(option.dataset && option.dataset.fallbackMiljo === "1"){
        option.remove();
      }
    });

    labels.forEach(label => {
      const option = document.createElement("option");
      option.value = label;
      option.textContent = label;
      option.dataset.fallbackMiljo = "1";
      select.appendChild(option);
    });

    if(current){
      select.value = current;
    }else{
      select.value = "";
    }
  }

  function retryKnownEnvironmentLoaders(){
    [
      "loadEnvironmentOptions",
      "loadMiljoOptions",
      "loadMiljøOptions",
      "loadLookupOptions",
      "loadRegisterLookups",
      "loadOptions",
      "populateEnvironmentOptions",
      "populateMiljoOptions"
    ].forEach(name => {
      const fn = window[name];
      if(typeof fn !== "function"){
        return;
      }

      try{
        fn();
      }catch(error){}
    });
  }

  function ensureEnvironmentOptions(){
    const select = getEnvironmentSelect();
    if(!select){
      return;
    }

    if(hasRealEnvironmentOptions(select)){
      return;
    }

    retryKnownEnvironmentLoaders();

    // If async loader still has not filled it, provide safe fallback choices.
    setTimeout(() => addFallbackEnvironmentOptions(select), 300);
    setTimeout(() => addFallbackEnvironmentOptions(select), 900);
    setTimeout(() => addFallbackEnvironmentOptions(select), 1600);
  }

  function run(){
    stabilizeMobileDate();
    ensureEnvironmentOptions();
  }

  window.stabilizeOpplevelserMobileDate = stabilizeMobileDate;
  window.ensureOpplevelserEnvironmentOptions = ensureEnvironmentOptions;

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", run);
  }else{
    run();
  }

  window.addEventListener("pageshow", run);

  // Finite retries only, no MutationObserver.
  [50, 150, 350, 700, 1200, 2000, 3500].forEach(delay => {
    setTimeout(run, delay);
  });

  document.addEventListener("click", event => {
    if(event.target && event.target.closest && event.target.closest("select")){
      ensureEnvironmentOptions();
    }
  }, true);
})();
</script>
