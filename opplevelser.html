<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Opplevelser</title>
  <style>
    :root{
      color-scheme: light dark;
      --bg:#f4f5f7;
      --card:#ffffff;
      --text:#172033;
      --muted:#5d6678;
      --border:#d8dde8;
      --accent:#2563eb;
      --danger:#b42318;
      --ok:#067647;
      --soft:#eef2ff;
      --input-bg:transparent;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --bg:#10131a;
        --card:#171b24;
        --text:#f1f5f9;
        --muted:#a7b0c0;
        --border:#303746;
        --accent:#7aa2ff;
        --soft:#20293a;
        --input-bg:#151a24;
      }
    }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:var(--bg); color:var(--text); }
    .wrap{ max-width:1100px; margin:0 auto; padding:18px; }
    .card{ background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px; box-shadow:0 10px 25px rgba(15,23,42,.08); }
    h1{ margin:0 0 4px; font-size:1.6rem; }
    .sub{ color:var(--muted); margin:0 0 18px; }
    .toolbar{ display:grid; grid-template-columns:1fr auto; gap:10px; align-items:end; margin-bottom:14px; }
    label{ display:block; font-weight:650; margin:0 0 6px; }
    input, textarea, select{ width:100%; min-height:44px; border:1px solid var(--border); border-radius:10px; padding:10px 12px; font:inherit; background:var(--input-bg); color:var(--text); box-sizing:border-box; }
    textarea{ min-height:94px; resize:vertical; }
    button{ border:0; border-radius:999px; padding:10px 14px; min-height:42px; font-weight:700; cursor:pointer; background:var(--accent); color:white; }
    button.secondary{ background:transparent; color:var(--text); border:1px solid var(--border); }
    button:disabled{ opacity:.6; cursor:not-allowed; }
    .status{ margin-top:14px; padding:10px 12px; border-radius:10px; border:1px solid var(--border); color:var(--muted); white-space:pre-wrap; }
    .status.err{ color:var(--danger); }
    .status.ok{ color:var(--ok); }
    .list{ display:grid; grid-template-columns:340px 1fr; gap:14px; }
    .items{ border:1px solid var(--border); border-radius:12px; overflow:hidden; background:rgba(127,127,127,.04); }
    .item{ display:block; width:100%; padding:12px; border:0; border-bottom:1px solid var(--border); border-radius:0; background:transparent; color:var(--text); text-align:left; cursor:pointer; }
    .item:hover, .item.active{ background:var(--soft); }
    .item-title{ font-weight:800; margin-bottom:4px; }
    .item-meta{ color:var(--muted); font-size:.92rem; line-height:1.35; }
    .desktop-extra{ display:inline; }
    .details{ border:1px solid var(--border); border-radius:12px; padding:14px; min-height:360px; }
    .detail-head{ display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom:10px; }
    .detail-title{ font-size:1.3rem; font-weight:850; margin:0 0 8px; }
    .detail-meta{ color:var(--muted); margin-bottom:14px; }
    .section{ margin-top:14px; }
    .section h3{ margin:0 0 6px; font-size:1rem; }
    .section p{ margin:0; line-height:1.45; white-space:pre-wrap; }
    .bible{ border:1px dashed var(--border); border-radius:10px; padding:10px 12px; }
    .empty{ color:var(--muted); padding:18px; }
    .edit-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .edit-grid .full{ grid-column:1 / -1; }
    .edit-actions{ display:flex; flex-wrap:wrap; gap:10px; margin-top:14px; }
    .readonly-actions{ display:flex; gap:10px; flex-wrap:wrap; }
    @media(max-width:800px){
      .wrap{ padding:10px; }
      .toolbar{ grid-template-columns:1fr; }
      .list{ grid-template-columns:1fr; }
      .details{ min-height:0; }
      .desktop-extra{ display:none; }
      .item-meta{ font-size:.9rem; }
      .edit-grid{ grid-template-columns:1fr; }
      .edit-grid .full{ grid-column:auto; }
      .detail-head{ flex-direction:column; }
      .readonly-actions{ width:100%; }
      .readonly-actions button{ width:100%; }
    }
  
    .mobile-only{ display:none; }

    @media(max-width:800px){
      .mobile-only{ display:inline-flex; }
      .card{ padding:14px; }
      h1{ font-size:1.45rem; }
      .sub{ font-size:.95rem; }

      .toolbar{
        grid-template-columns:1fr;
        gap:8px;
      }

      .toolbar button{
        width:100%;
      }

      .list{
        grid-template-columns:1fr;
      }

      .items.mobile-detail-open{
        display:none;
      }

      .details{
        display:none;
        min-height:0;
      }

      .details.mobile-visible{
        display:block;
      }

      .item{
        padding:14px 12px;
      }

      .item-title{
        font-size:1rem;
        line-height:1.25;
        margin-bottom:6px;
      }

      .item-meta{
        font-size:.92rem;
        line-height:1.35;
      }

      .desktop-extra{
        display:none !important;
      }

      .detail-head{
        flex-direction:column;
      }

      .readonly-actions{
        width:100%;
        display:grid;
        grid-template-columns:1fr;
      }

      .readonly-actions button{
        width:100%;
      }

      .edit-grid{
        grid-template-columns:1fr;
      }

      .edit-grid .full{
        grid-column:auto;
      }
    }

  

/* Opplevelser standard design v14 */
html.opplevelser-size-small{--opp-font-scale:1;}
html.opplevelser-size-medium{--opp-font-scale:1.12;}
html.opplevelser-size-large{--opp-font-scale:1.25;}

:root{
  --opp-bg:#f2f2f2;
  --opp-card:#fff;
  --opp-text:#333;
  --opp-muted:#667;
  --opp-border:#ccc;
  --opp-link:#1f789d;
  --opp-button:#fff;
  --opp-button-hover:#e9eef2;
  --opp-soft:#eaeaea;
  --opp-danger:#d77;
  --opp-success:#72c184;
}
body.dark-mode{
  --opp-bg:#151515;
  --opp-card:#242424;
  --opp-text:#eee;
  --opp-muted:#bbb;
  --opp-border:#555;
  --opp-link:#7cc7e8;
  --opp-button:#242424;
  --opp-button-hover:#3a3a3a;
  --opp-soft:#333;
}
body.light-mode{
  --opp-bg:#f2f2f2;
  --opp-card:#fff;
  --opp-text:#333;
  --opp-muted:#667;
  --opp-border:#ccc;
  --opp-link:#1f789d;
  --opp-button:#fff;
  --opp-button-hover:#e9eef2;
  --opp-soft:#eaeaea;
}
body{
  background:var(--opp-bg) !important;
  color:var(--opp-text) !important;
  font-size:calc(16px * var(--opp-font-scale, 1)) !important;
}
.wrap,.container{
  max-width:980px !important;
  margin:auto !important;
  padding:0 !important;
}
.header{
  text-align:center !important;
  margin-bottom:20px !important;
}
.site-title{
  margin:0 !important;
  font-size:30px !important;
  font-weight:800 !important;
}
.subtitle{
  margin-top:8px !important;
  color:var(--opp-muted) !important;
  font-size:16px !important;
}
.top-buttons{
  display:flex !important;
  justify-content:center !important;
  align-items:center !important;
  gap:10px !important;
  margin:14px 0 0 !important;
  flex-wrap:wrap !important;
}
.top-button{
  display:inline-flex !important;
  align-items:center !important;
  justify-content:center !important;
  width:44px !important;
  height:44px !important;
  padding:0 !important;
  background:var(--opp-card) !important;
  border:1px solid var(--opp-border) !important;
  border-radius:8px !important;
  color:var(--opp-text) !important;
  text-decoration:none !important;
  font-size:24px !important;
  font-weight:bold !important;
  line-height:1 !important;
  cursor:pointer !important;
}
.top-button:hover,
button:hover{
  background:var(--opp-button-hover) !important;
}
.top-button.app-switch-button{font-size:19px !important;}
.font-size-button{font-size:18px !important;}
.design-toggle-button{font-size:21px !important;}
.card{
  background:var(--opp-card) !important;
  border:1px solid var(--opp-border) !important;
  color:var(--opp-text) !important;
}
input,textarea,select{
  background:var(--opp-card) !important;
  color:var(--opp-text) !important;
  border:1px solid var(--opp-border) !important;
}
button,.secondary{
  background:var(--opp-button) !important;
  color:var(--opp-text) !important;
  border:1px solid var(--opp-border) !important;
}
button:not(.secondary), button.primary, .primary{
  background:var(--opp-link) !important;
  border-color:var(--opp-link) !important;
  color:#fff !important;
}
.status{color:var(--opp-muted) !important;}
.status.err,.status.error{color:var(--opp-danger) !important;}
.status.ok,.status.success{color:var(--opp-success) !important;}
.item,.details,.items,.bible{
  background:var(--opp-card) !important;
  border-color:var(--opp-border) !important;
  color:var(--opp-text) !important;
}
.item.active{
  background:rgba(124,199,232,.16) !important;
}

/* Soft design: fjern oppstreket uttrykk og bruk rolige bakgrunner, som Handleliste soft mode. */
html:not(.classic-design-root) .card,
html:not(.classic-design-root) .details,
html:not(.classic-design-root) .items,
html:not(.classic-design-root) .bible{
  border:0 !important;
  background:rgba(255,255,255,.038) !important;
  box-shadow:none !important;
}
html:not(.classic-design-root) .item,
html:not(.classic-design-root) input,
html:not(.classic-design-root) textarea,
html:not(.classic-design-root) select{
  border:0 !important;
  background:rgba(0,0,0,.18) !important;
  box-shadow:none !important;
}
html:not(.classic-design-root) .top-button,
html:not(.classic-design-root) button,
html:not(.classic-design-root) .secondary{
  border:0 !important;
  background:rgba(255,255,255,.055) !important;
  box-shadow:none !important;
}
html:not(.classic-design-root) button:not(.secondary),
html:not(.classic-design-root) button.primary,
html:not(.classic-design-root) .primary{
  background:var(--opp-link) !important;
  color:#fff !important;
}
body.light-mode html:not(.classic-design-root),
body.light-mode:not(.classic-design-root) .card{
  background:rgba(0,0,0,.035) !important;
}
@media(max-width:700px){
  body{padding:6px !important;}
  .header{margin-bottom:12px !important;}
  .site-title{font-size:28px !important;}
  .top-buttons{gap:8px !important;}
  .top-button{width:40px !important;height:40px !important;font-size:22px !important;}
}


/* Opplevelser v15 design polish */
.top-button,
html:not(.classic-design-root) .top-button,
html:not(.classic-design-root) button.top-button{
  background:rgba(255,255,255,.055) !important;

  border:0 !important;

}
.top-button:hover,
html:not(.classic-design-root) .top-button:hover{

  color:var(--opp-text) !important;
}
.top-button.app-switch-button{
  font-size:28px !important;
}
.top-button.home-button{
  font-size:30px !important;
}
.top-button.font-size-button{
  font-size:18px !important;
}
.top-button.design-toggle-button{
  font-size:21px !important;
}

/* Valgt opplevelse: diskret grå utheving i stedet for blå flate */
.item.active,
html:not(.classic-design-root) .item.active{
  background:rgba(255,255,255,.085) !important;
  color:var(--opp-text) !important;
}
body.light-mode .item.active,
body.light-mode html:not(.classic-design-root) .item.active{

}

/* Bibelsted/status skal være myke flater uten linjemarkering */
html:not(.classic-design-root) .bible,
html:not(.classic-design-root) .selected-text,
html:not(.classic-design-root) .status,
html:not(.classic-design-root) .status.card,
html:not(.classic-design-root) #status{
  border:0 !important;
  background:rgba(0,0,0,.16) !important;
  box-shadow:none !important;
}
body.light-mode html:not(.classic-design-root) .bible,
body.light-mode html:not(.classic-design-root) .selected-text,
body.light-mode html:not(.classic-design-root) .status,
body.light-mode html:not(.classic-design-root) .status.card,
body.light-mode html:not(.classic-design-root) #status{
  background:rgba(0,0,0,.045) !important;
}


/* Opplevelser v10 list selection fix: never blue list cards */
.items .item,
html:not(.classic-design-root) .items .item{
  background:rgba(255,255,255,.035) !important;
  color:var(--opp-text) !important;
  border:0 !important;
  box-shadow:none !important;
}

.items .item:hover,
html:not(.classic-design-root) .items .item:hover{
  background:rgba(255,255,255,.060) !important;
  color:var(--opp-text) !important;
}

.items .item.active,
html:not(.classic-design-root) .items .item.active{
  background:rgba(255,255,255,.095) !important;
  color:var(--opp-text) !important;
}

body.light-mode .items .item,
body.light-mode html:not(.classic-design-root) .items .item{
  background:rgba(0,0,0,.030) !important;
}

body.light-mode .items .item:hover,
body.light-mode html:not(.classic-design-root) .items .item:hover{
  background:rgba(0,0,0,.055) !important;
}

body.light-mode .items .item.active,
body.light-mode html:not(.classic-design-root) .items .item.active{
  background:rgba(0,0,0,.085) !important;
}



/* Opplevelser v19: login widget copied from Kvimarka92 index style */
.login-widget{
  position:absolute;
  top:20px;
  right:max(20px, calc((100vw - 980px) / 2));
  z-index:9999;
  height:38px;
  display:flex;
  align-items:center;
}

.login-status{
  display:flex;
  align-items:center;
  justify-content:center;
  width:38px;
  height:38px;
  min-width:38px;
  min-height:38px;
  padding:0;
  border:1px solid var(--opp-border, var(--border, #555));
  background:var(--opp-card, var(--card, #242424));
  border-radius:50%;
  color:var(--opp-muted, var(--muted, #bbb));
  text-decoration:none;
  font-size:13px;
  font-weight:bold;
  line-height:1;
  opacity:.86;
  box-sizing:border-box;
  cursor:pointer;
  white-space:nowrap;
}

.login-status:hover{
  opacity:1;
  color:var(--opp-text, var(--text, #eee));
  background-color:var(--opp-card, var(--card, #242424));
}

.login-status.is-signin{
  border:none;
  border-radius:0;
  background-color:transparent;
  background-image:url("LogInDG.png");
  background-repeat:no-repeat;
  background-position:center;
  background-size:38px 38px;
  text-indent:-9999px;
  overflow:hidden;
}

.login-menu{
  position:absolute;
  top:44px;
  right:0;
  min-width:247px;
  padding:10px;
  border:0;
  border-radius:10px;
  background:rgba(255,255,255,.06);
  color:var(--opp-text, var(--text, #eee));
  box-shadow:none;
  box-sizing:border-box;
}

html.classic-design-root .login-menu{
  border:1px solid var(--opp-border, var(--border, #555));
  background:var(--opp-card, var(--card, #242424));
  box-shadow:0 8px 24px rgba(0,0,0,.18);
}

.login-menu-name{
  font-weight:bold;
  font-size:13px;
  margin-bottom:8px;
  color:var(--opp-text, var(--text, #eee));
  white-space:nowrap;
}

.login-menu-link{
  display:block;
  padding:8px 10px;
  margin:0 -4px -4px;
  border-radius:8px;
  color:var(--opp-link, var(--link, #7cc7e8));
  text-decoration:none;
  font-weight:bold;
  font-size:13px;
}

.login-menu-link:hover{
  background:rgba(127,127,127,.10);
}

.login-menu-link:active{
  background:rgba(127,127,127,.22);
}

@media(max-width:800px){
  .login-widget{
    top:10px;
    right:10px;
  }
}


/* Opplevelser v20 voice buttons right side */

  align-items:center !important;
  justify-content:space-between !important;
  gap:10px !important;
  margin-bottom:6px !important;
}
.voice-field-header label{
  margin:0 !important;
}
.voice-actions{
  display:flex !important;

  justify-content:flex-end !important;
  gap:8px !important;
  margin-left:auto !important;
}
.clear-voice-button,
.mic-button{
  display:inline-flex !important;
  align-items:center !important;
  justify-content:center !important;
  width:36px !important;
  height:32px !important;
  min-height:32px !important;
  padding:0 !important;
  border:0 !important;
  border-radius:999px !important;
  background:rgba(255,255,255,.07) !important;
  color:var(--opp-text, #eee) !important;
  font-size:16px !important;
  font-weight:800 !important;
  line-height:1 !important;
  cursor:pointer !important;
  box-shadow:none !important;
}
.clear-voice-button:hover,
.mic-button:hover{

}
.clear-voice-button{
  font-size:19px !important;
}
.mic-button{

}

body.light-mode .clear-voice-button,

}

body.light-mode .mic-button:hover{

  box-shadow:none !important;
}

#editForm.card{

/* Delete buttons must be neutral/grey, never accent blue */
.clear-voice-button,
button.clear-voice-button,
html:not(.classic-design-root) .clear-voice-button,
html:not(.classic-design-root) button.clear-voice-button,
body.dark-mode .clear-voice-button,
body.dark-mode button.clear-voice-button{
  background:rgba(255,255,255,.075) !important;
  color:var(--opp-text, #eee) !important;
  border:0 !important;
  box-shadow:none !important;
}

.clear-voice-button:hover,
button.clear-voice-button:hover,
html:not(.classic-design-root) .clear-voice-button:hover,
html:not(.classic-design-root) button.clear-voice-button:hover,
body.dark-mode .clear-voice-button:hover,
body.dark-mode button.clear-voice-button:hover{
  background:rgba(255,255,255,.13) !important;
  color:var(--opp-text, #eee) !important;
}

body.light-mode .clear-voice-button,
body.light-mode button.clear-voice-button,
body.light-mode html:not(.classic-design-root) .clear-voice-button,
body.light-mode html:not(.classic-design-root) button.clear-voice-button{
  background:rgba(0,0,0,.075) !important;
  color:var(--opp-text, #333) !important;
}

    const editMelodyRecordings = new Map();

    function noteNameFromFrequency(frequency){
      if(!frequency || !Number.isFinite(frequency) || frequency < 50 || frequency > 2000){
        return "";
      }

      const names = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
      const midi = Math.round(12 * Math.log2(frequency / 440) + 69);
      const octave = Math.floor(midi / 12) - 1;
      return names[((midi % 12) + 12) % 12] + octave;
    }

    function autoCorrelatePitch(buffer, sampleRate){
      let rms = 0;

      for(let i = 0; i < buffer.length; i += 1){
        rms += buffer[i] * buffer[i];
      }

      rms = Math.sqrt(rms / buffer.length);

      if(rms < 0.012){
        return 0;
      }

      let start = 0;
      let end = buffer.length - 1;
      const threshold = 0.2;

      for(let i = 0; i < buffer.length / 2; i += 1){
        if(Math.abs(buffer[i]) < threshold){
          start = i;
          break;
        }
      }

      for(let i = 1; i < buffer.length / 2; i += 1){
        if(Math.abs(buffer[buffer.length - i]) < threshold){
          end = buffer.length - i;
          break;
        }
      }

      const trimmed = buffer.slice(start, end);
      const size = trimmed.length;
      const correlations = new Array(size).fill(0);

      for(let lag = 0; lag < size; lag += 1){
        for(let i = 0; i < size - lag; i += 1){
          correlations[lag] += trimmed[i] * trimmed[i + lag];
        }
      }

      let d = 0;
      while(d < size - 1 && correlations[d] > correlations[d + 1]){
        d += 1;
      }

      let maxValue = -1;
      let maxPosition = -1;

      for(let i = d; i < size; i += 1){
        if(correlations[i] > maxValue){
          maxValue = correlations[i];
          maxPosition = i;
        }
      }

      if(maxPosition <= 0){
        return 0;
      }

      return sampleRate / maxPosition;
    }

    function stopEditMelodyPitchDetection(){
      if(!activeEditMelodyPitch){
        return;
      }

      activeEditMelodyPitch.running = false;

      if(activeEditMelodyPitch.animationId){
        cancelAnimationFrame(activeEditMelodyPitch.animationId);
      }

      if(activeEditMelodyPitch.audioContext){
        activeEditMelodyPitch.audioContext.close().catch(() => {});
      }

      activeEditMelodyPitch = null;

    async function startEditMelodyPitchDetection(number, stream){
      stopEditMelodyPitchDetection();

      const AudioContextClass = window.AudioContext || window.webkitAudioContext;

      if(!AudioContextClass){
        setEditMelodyPitchText(number, "Toner: støttes ikke i denne nettleseren", false);
        return;
      }

      const audioContext = new AudioContextClass();
      await audioContext.resume().catch(() => {});
      const analyser = audioContext.createAnalyser();
      analyser.fftSize = 2048;
      analyser.smoothingTimeConstant = 0.15;

      const source = audioContext.createMediaStreamSource(stream);
      source.connect(analyser);

      const buffer = new Float32Array(analyser.fftSize);
      const notes = [];
      editMelodyDetectedNotes.set(Number(number), notes);

      let lastNote = "";
      let lastAcceptedAt = 0;

      activeEditMelodyPitch = {
        running:true,
        audioContext,
        analyser,
        animationId:0
      };

      function tick(){
        if(!activeEditMelodyPitch || !activeEditMelodyPitch.running){
          return;
        }

        analyser.getFloatTimeDomainData(buffer);
        const frequency = autoCorrelatePitch(buffer, audioContext.sampleRate);
        const note = noteNameFromFrequency(frequency);
        const now = Date.now();

        if(note && (note !== lastNote || now - lastAcceptedAt > 900)){
          notes.push(note);
          lastNote = note;
          lastAcceptedAt = now;

          const displayNotes = notes.slice(-24).join(" ");
          setEditMelodyPitchText(number, "Toner: " + displayNotes, true);
          renderNotesWithVexFlow(el("editMelodyNotation" + Number(number)), displayNotes);
        }

        activeEditMelodyPitch.animationId = requestAnimationFrame(tick);
      }

      setEditMelodyPitchText(number, "Toner: lytter ...", true);
      tick();
    }




    function getVexFlowApi(){
      if(window.VexFlow && window.VexFlow.Renderer){
        return window.VexFlow;
      }

      if(window.Vex && window.Vex.Flow && window.Vex.Flow.Renderer){
        return window.Vex.Flow;
      }

      return null;
    }

    function parseDetectedNotesForNotation(notesText){
      const pitchClass = {
        c:0, "c#":1, db:1,
        d:2, "d#":3, eb:3,
        e:4,
        f:5, "f#":6, gb:6,
        g:7, "g#":8, ab:8,
        a:9, "a#":10, bb:10,
        b:11
      };

      function midiToVexKey(midi, accidental){
        const sharpNames = ["c","c#","d","d#","e","f","f#","g","g#","a","a#","b"];
        const pc = ((midi % 12) + 12) % 12;
        const octave = Math.floor(midi / 12) - 1;
        const name = sharpNames[pc];

        return {
          key:`${name}/${octave}`,
          accidental:name.includes("#") ? "#" : "",
          midi
        };
      }

      function nearestReadableMidi(pc, previousMidi){
        // VexFlow-trinn 1: tegn melodien i et lesbart register.
        // Pitchdeteksjon kan hoppe feil oktav, f.eks. G#6 midt mellom B2/A2.
        // Vi beholder tonenavnet, men velger oktaven som ligger nærmest forrige tegnede note.
        const minMidi = 55; // G3
        const maxMidi = 79; // G5
        const target = previousMidi || 64; // E4
        let best = null;
        let bestDistance = Infinity;

        for(let octave = 2; octave <= 6; octave += 1){
          const midi = (octave + 1) * 12 + pc;

          if(midi < minMidi || midi > maxMidi){
            continue;
          }

          const distance = Math.abs(midi - target);

          if(distance < bestDistance){
            best = midi;
            bestDistance = distance;
          }
        }

        return best !== null ? best : target;
      }

      const tokens = String(notesText || "")
        .replace(/^Toner:\s*/i, "")
        .trim()
        .split(/\s+/)
        .map(token => token.trim())
        .filter(Boolean);

      const parsed = [];
      let previousMidi = null;

      tokens.forEach(token => {
        const match = token.match(/^([A-Ga-g])([#b]?)(-?\d)$/);

        if(!match){
          return;
        }

        const name = (match[1] + (match[2] || "")).toLowerCase();
        const pc = pitchClass[name];

        if(pc === undefined){
          return;
        }

        const midi = nearestReadableMidi(pc, previousMidi);
        previousMidi = midi;

        const converted = midiToVexKey(midi, match[2] || "");

        parsed.push({
          key:converted.key,
          accidental:converted.accidental,
          original:token,
          midi
        });
      });

      return parsed.slice(0, 16);
    }

    function renderNotesWithVexFlow(container, notesText){
      if(!container){
        return;
      }

      const parsed = parseDetectedNotesForNotation(notesText);
      container.innerHTML = "";

      if(!parsed.length){
        container.classList.add("empty");
        container.style.removeProperty("--notation-height");
        return;
      }

      container.classList.remove("empty");

      const VF = getVexFlowApi();

      if(!VF){
        container.textContent = "Notelinje kunne ikke vises. VexFlow er ikke lastet.";
        return;
      }

      try{
        const width = Math.max(280, Math.min(container.clientWidth || 560, 760));
        const notesPerLine = width < 420 ? 10 : 14;
        const rows = [];

        for(let i = 0; i < parsed.length; i += notesPerLine){
          rows.push(parsed.slice(i, i + notesPerLine));
        }

        const rowHeight = 112;
        const topPadding = 14;
        const height = topPadding + (rows.length * rowHeight) + 24;

        container.style.setProperty("--notation-height", `${height + 4}px`);

        const renderer = new VF.Renderer(container, VF.Renderer.Backends.SVG);
        renderer.resize(width, height);

        const context = renderer.getContext();
        context.setFont("Arial", 10, "").setBackgroundFillStyle("transparent");

        rows.forEach((row, rowIndex) => {
          const y = topPadding + (rowIndex * rowHeight) + 28;
          const stave = new VF.Stave(8, y, width - 16);

          if(rowIndex === 0){
            stave.addClef("treble");
          }

          stave.setContext(context).draw();

          const notes = row.map(item => {
            const staveNote = new VF.StaveNote({
              clef:"treble",
              keys:[item.key],
              duration:"q"
            });

            if(item.accidental){
              if(typeof staveNote.addModifier === "function"){
                staveNote.addModifier(new VF.Accidental(item.accidental), 0);
              }else if(typeof staveNote.addAccidental === "function"){
                staveNote.addAccidental(0, new VF.Accidental(item.accidental));
              }
            }

            return staveNote;
          });

          const voice = new VF.Voice({
            num_beats:Math.max(1, notes.length),
            beat_value:4
          });

          if(typeof voice.setStrict === "function"){
            voice.setStrict(false);
          }

          voice.addTickables(notes);

          new VF.Formatter()
            .joinVoices([voice])
            .format([voice], Math.max(120, width - 70));

          voice.draw(context, stave);
        });
      }catch(error){
        container.innerHTML = "";
        container.textContent = "Kunne ikke tegne notelinje: " + (error.message || error);
      }
    }

    function renderEditMelodyNotation(number){

    function getEditMelodyDetectedNotes(number){
      const fromMap = editMelodyDetectedNotes.get(Number(number)) || [];
      if(fromMap.length){
        return fromMap.join(" ");
      }

      const target = el("editMelodyPitch" + Number(number));
      const text = String(target && target.textContent || "").replace(/^Toner:\s*/i, "").trim();
      return text && text !== "—" && !/^lytter/i.test(text) && !/^støttes/i.test(text) ? text : "";
    }

    function bestMelodyMimeType(){
      const candidates = ["audio/webm;codecs=opus", "audio/webm", "audio/mp4", "audio/ogg;codecs=opus"];
      for(const candidate of candidates){
        if(window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(candidate)){
          return candidate;
        }
      }
      return "";
    }

    function setEditMelodyState(number, text){

    function clearEditMelodyRecording(number, options){
      const n = Number(number || 0);
      const opts = options || {};
      const current = editMelodyRecordings.get(n);
      if(current && current.url){
        try{ URL.revokeObjectURL(current.url); }catch(error){}
      }
      editMelodyRecordings.delete(n);
      const audio = el("editMelodyAudio" + n);
      if(audio && !opts.keepExistingAudio){
        audio.pause();
        audio.removeAttribute("src");
        audio.style.display = "none";
      }
      if(!opts.keepExistingAudio){
        setEditMelodyState(n, "Ikke spilt inn");
        resetEditMelodyPitch(n);
      }
    }

    function stopActiveEditMelodyRecording(){
      if(activeEditMelodyRecorder && activeEditMelodyRecorder.state !== "inactive"){
        try{ activeEditMelodyRecorder.stop(); }catch(error){}
      }
    }

    async function toggleEditMelodyRecording(number){
      const n = Number(number || 0);
      const button = document.querySelector(`[data-edit-melody-record="${n}"]`);
      if(!n || !button) return;

      if(activeEditMelodyRecorder && activeEditMelodyNumber === n){
        stopActiveEditMelodyRecording();
        return;
      }

      if(activeEditMelodyRecorder){
        stopActiveEditMelodyRecording();
        return;
      }

      if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || !window.MediaRecorder){
        alert("Lydopptak støttes ikke i denne nettleseren.");
        return;
      }

      const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
      await startEditMelodyPitchDetection(n, stream);
      const mimeType = bestMelodyMimeType();
      const recorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});

      activeEditMelodyRecorder = recorder;
      activeEditMelodyNumber = n;
      activeEditMelodyChunks = [];
      activeEditMelodyStream = stream;

      button.classList.add("recording");
      button.title = "Stopp opptak";
      button.setAttribute("aria-label", "Stopp opptak");
      setEditMelodyState(n, "Spiller inn ... trykk knappen igjen for å stoppe.");

      recorder.ondataavailable = event => {
        if(event.data && event.data.size) activeEditMelodyChunks.push(event.data);
      };

      recorder.onstop = () => {
        const type = recorder.mimeType || mimeType || "audio/webm";
        const blob = new Blob(activeEditMelodyChunks, { type });
        const url = URL.createObjectURL(blob);
        const audio = el("editMelodyAudio" + n);

        const detectedBeforeClear = (editMelodyDetectedNotes.get(n) || []).slice();
        clearEditMelodyRecording(n, { keepExistingAudio:false });
        editMelodyDetectedNotes.set(n, detectedBeforeClear);
        editMelodyRecordings.set(n, { blob, url, type });

        if(audio){
          audio.src = url;
          audio.style.display = "";
        }

        stopEditMelodyPitchDetection();
        const detected = editMelodyDetectedNotes.get(n) || [];
        setEditMelodyState(n, detected.length ? "Nytt opptak klart. Toner registrert." : "Nytt opptak klart.");
        setEditMelodyCardEmptyState(n, false);
        setEditMelodyPitchText(n, detected.length ? "Toner: " + detected.join(" ") : "Toner: —", !!detected.length);
        renderEditMelodyNotation(n);
        button.classList.remove("recording");
        button.title = "Start opptak";
        button.setAttribute("aria-label", "Start opptak");

        if(activeEditMelodyStream){
          activeEditMelodyStream.getTracks().forEach(track => track.stop());
        }

        activeEditMelodyRecorder = null;
        activeEditMelodyNumber = null;
        activeEditMelodyChunks = [];
        activeEditMelodyStream = null;
      };

      recorder.start();
    }

    async function loadEditMelodies(experienceId){
      ensureAllEditMelodyCardsVisible();

      const data = await apiFetch(`/experience-melodies?experienceId=${encodeURIComponent(experienceId)}`, { method:"GET" });

      for(let number = 1; number <= 5; number += 1){

        if(el("editMelodyNote" + number)) el("editMelodyNote" + number).value = "";
        if(el("editMelodyDate" + number)) el("editMelodyDate" + number).value = todayIsoDate();
        clearEditMelodyRecording(number, { keepExistingAudio:false });
        setEditMelodyCardEmptyState(number, true);
      }

      items.forEach(item => {
        const number = Number(item.melodyNumber || 0);
        if(number < 1 || number > 5) return;

        setEditMelodyCardEmptyState(number, false);

        if(el("editMelodyId" + number)) el("editMelodyId" + number).value = item.id || "";
        if(el("editMelodyNote" + number)) el("editMelodyNote" + number).value = item.note || "";
        if(el("editMelodyDate" + number)) el("editMelodyDate" + number).value = item.recordingDate || todayIsoDate();

        const audio = el("editMelodyAudio" + number);
        if(audio && item.audioUrl){
          audio.src = item.audioUrl;

          setEditMelodyState(number, "Opptak lagret.");
          setEditMelodyPitchText(number, item.detectedNotes ? "Toner: " + item.detectedNotes : "Toner: —", !!item.detectedNotes);
          renderEditMelodyNotation(number);
        }else{
          setEditMelodyState(number, item.note ? "Notat lagret uten opptak." : "Ikke spilt inn");
        }
      });

      // Viktig på mobil: tomme melodier skal fortsatt vises, slik at man kan spille inn senere.
      ensureAllEditMelodyCardsVisible();
      items.forEach(item => {
        const number = Number(item.melodyNumber || 0);
        if(number >= 1 && number <= 5){
          setEditMelodyCardEmptyState(number, false);
        }
      });

    async function saveEditMelodiesForExperience(experienceId){
      const uploads = [];

      for(let number = 1; number <= 5; number += 1){
        const melodyId = Number(el("editMelodyId" + number)?.value || 0);
        const note = el("editMelodyNote" + number)?.value || "";
        const recording = editMelodyRecordings.get(number);

        if(!melodyId && !recording && !note.trim()) continue;

        const formData = new FormData();
        const extension = recording && recording.type && recording.type.includes("mp4") ? "mp4" : (recording && recording.type && recording.type.includes("ogg") ? "ogg" : "webm");
        formData.append("experienceId", String(experienceId));
        formData.append("melodyNumber", String(number));
        formData.append("melodyId", melodyId ? String(melodyId) : "");
        formData.append("recordingDate", el("editMelodyDate" + number)?.value || todayIsoDate());
        formData.append("note", note);
        formData.append("detectedNotes", getEditMelodyDetectedNotes(number));

        if(recording && recording.blob){
          formData.append("audio", recording.blob, `melodi-${number}.${extension}`);
        }

        uploads.push(apiFetchFormData("/experience-melody-save", formData));
      }

      return uploads.length ? await Promise.all(uploads) : [];
    }

    async function svgElementToPngDataUrl(svgElement){
      if(!svgElement){
        return "";
      }

      const clone = svgElement.cloneNode(true);
      clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");

      const width = Math.ceil(svgElement.getBoundingClientRect().width || svgElement.viewBox?.baseVal?.width || 760);
      const height = Math.ceil(svgElement.getBoundingClientRect().height || svgElement.viewBox?.baseVal?.height || 160);

      clone.setAttribute("width", String(width));
      clone.setAttribute("height", String(height));

      const svgText = new XMLSerializer().serializeToString(clone);
      const blob = new Blob([svgText], { type:"image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);

      try{
        const image = new Image();

        await new Promise((resolve, reject) => {
          image.onload = resolve;
          image.onerror = reject;
          image.src = url;
        });

        const canvas = document.createElement("canvas");
        canvas.width = Math.max(1, width);
        canvas.height = Math.max(1, height);

        const context = canvas.getContext("2d");
        context.fillStyle = "#ffffff";
        context.fillRect(0, 0, canvas.width, canvas.height);
        context.drawImage(image, 0, 0);

        return canvas.toDataURL("image/png");
      }finally{
        URL.revokeObjectURL(url);
      }
    }

    async function collectReadonlyNotationPngs(){

        if(card){

          const match = String(heading && heading.textContent || "").match(/Melodi\s+(\d+)/i);
          if(match){
            melodyNumber = Number(match[1]);
          }
        }

        const png = await svgElementToPngDataUrl(svg);

        if(png){
          list.push({ melodyNumber, png });
        }
      }

      return list;
    }

<script>
(function(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let activeRecognition = null;
  let activeButton = null;
  let activeTextarea = null;
  let baseText = "";

  function setVoiceStatus(text){
    let status = document.getElementById("voiceStatus");

    if(!status){
      status = document.createElement("div");
      status.id = "voiceStatus";
      status.className = "voice-status";
      const firstMic = document.querySelector(".mic-button");
      if(firstMic && firstMic.closest(".voice-field-wrap")){
        firstMic.closest(".voice-field-wrap").appendChild(status);
      }else{
        document.body.appendChild(status);
      }
    }

    status.textContent = text || "";
    status.classList.toggle("visible", !!text);
  }

  function stopActiveRecognition(){
    if(activeRecognition){
      try{ activeRecognition.stop(); }catch(error){}
    }

    if(activeButton){
      activeButton.classList.remove("listening");
      activeButton.title = "Les inn tekst";
      activeButton.setAttribute("aria-label", "Les inn tekst");
    }

    activeRecognition = null;
    activeButton = null;
    activeTextarea = null;
    baseText = "";
    setVoiceStatus("");
  }

  function appendTranscript(textarea, originalText, transcript){
    const spoken = String(transcript || "").trim();

    if(!spoken){
      return;
    }

    const before = String(originalText || "").trim();

    if(before){
      textarea.value = before + (/[.!?…]$/.test(before) ? " " : ". ") + spoken;
    }else{
      textarea.value = spoken;
    }

    textarea.dispatchEvent(new Event("input", { bubbles:true }));
    textarea.dispatchEvent(new Event("change", { bubbles:true }));
  }

  function startDictation(button, textareaId){
    const textarea = document.getElementById(textareaId);

    if(!textarea){
      alert("Fant ikke tekstfeltet.");
      return;
    }

    if(!SpeechRecognition){
      alert("Talegjenkjenning støttes ikke i denne nettleseren.");
      return;
    }

    if(activeRecognition && activeButton === button){
      stopActiveRecognition();
      return;
    }

    stopActiveRecognition();

    const recognition = new SpeechRecognition();
    recognition.lang = "nb-NO";
    recognition.interimResults = true;
    recognition.continuous = true;

    activeRecognition = recognition;
    activeButton = button;
    activeTextarea = textarea;
    baseText = textarea.value;

    button.classList.add("listening");
    button.title = "Stopp innlesing";
    button.setAttribute("aria-label", "Stopp innlesing");
    setVoiceStatus("Lytter ... trykk mikrofonen igjen for å stoppe.");

    let finalTranscript = "";

    recognition.onresult = event => {
      let interim = "";

      for(let index = event.resultIndex; index < event.results.length; index += 1){
        const result = event.results[index];
        const transcript = result[0] && result[0].transcript ? result[0].transcript : "";

        if(result.isFinal){
          finalTranscript += transcript + " ";
        }else{
          interim += transcript;
        }
      }

      const preview = (finalTranscript + " " + interim).trim();

      if(preview){
        appendTranscript(textarea, baseText, preview);
      }
    };

    recognition.onerror = event => {
      setVoiceStatus("Mikrofonfeil: " + (event.error || "ukjent feil"));
      window.setTimeout(stopActiveRecognition, 1200);
    };

    recognition.onend = () => {
      if(activeRecognition === recognition){
        stopActiveRecognition();
      }
    };

    try{
      recognition.start();
    }catch(error){
      setVoiceStatus("Kunne ikke starte mikrofon: " + error.message);
      stopActiveRecognition();
    }
  }

  function initMicButtons(){
    const buttons = document.querySelectorAll("[data-dictate-target]");

    buttons.forEach(button => {
      if(SpeechRecognition){
        button.classList.add("visible");
      }else{
        button.classList.remove("visible");
      }

      if(button.dataset.dictateReady === "1"){
        return;
      }

      button.dataset.dictateReady = "1";
      button.addEventListener("click", () => {
        startDictation(button, button.dataset.dictateTarget);
      });
    });
  }

  window.initOpplevelserMicButtons = initMicButtons;

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", initMicButtons);
  }else{
    initMicButtons();
  }
})();
</script>


<script>
(function(){
  const LOGIN_API_BASE = "https://api-kvimarka92.carstereogarage.com";

  function getInitials(nameOrEmail){
    const value = String(nameOrEmail || "").trim();

    if(!value){
      return "?";
    }

    const namePart = value.includes("@")
      ? value.split("@")[0]
      : value;

    const parts = namePart
      .split(/\s+/)
      .filter(Boolean);

    if(parts.length >= 2){
      return (parts[0][0] + parts[1][0]).toUpperCase();
    }

    return namePart.slice(0, 2).toUpperCase();
  }

  async function performOpplevelserLogout(){
    try{
      await fetch(`${LOGIN_API_BASE}/cdn-cgi/access/logout`, {
        method:"GET",
        credentials:"include",
        mode:"no-cors"
      });
    }catch(error){
      console.warn("Logout request may have been blocked, continuing anyway.", error);
    }

    window.location.href = window.location.pathname + "?logout=" + Date.now();
  }

  window.setupOpplevelserLoginWidget = function(user){
    const loginStatus = document.getElementById("loginStatus");
    const loginMenu = document.getElementById("loginMenu");
    const loginMenuName = document.getElementById("loginMenuName");
    const logoutLink = document.getElementById("logoutLink");

    if(!loginStatus || !loginMenu){
      return;
    }

    if(user && (user.name || user.email)){
      const displayName = user.name || user.email || "Innlogget";

      loginStatus.textContent = getInitials(displayName);
      loginStatus.href = "#";
      loginStatus.classList.remove("is-signin");
      loginStatus.classList.add("signed-in");
      loginStatus.title = displayName;
      loginStatus.setAttribute("aria-label", displayName);

      if(loginMenuName){
        loginMenuName.textContent = displayName;
      }

      loginStatus.onclick = function(event){
        event.preventDefault();
        loginMenu.style.display =
          loginMenu.style.display === "block" ? "none" : "block";
      };

      if(logoutLink){
        logoutLink.onclick = function(event){
          event.preventDefault();
          performOpplevelserLogout();
        };
      }
    }else{
      const returnUrl =
        window.location.origin +
        window.location.pathname +
        window.location.search;

      loginStatus.textContent = "Sign in";
      loginStatus.href =
        `${LOGIN_API_BASE}/login?returnUrl=${encodeURIComponent(returnUrl)}`;

      loginStatus.classList.add("is-signin");
      loginStatus.classList.remove("signed-in");
      loginStatus.title = "Logg inn";
      loginStatus.setAttribute("aria-label", "Logg inn");
      loginStatus.onclick = null;
      loginMenu.style.display = "none";
    }
  };

  document.addEventListener("click", function(event){
    const widget = document.querySelector(".login-widget");
    const menu = document.getElementById("loginMenu");

    if(widget && menu && !widget.contains(event.target)){
      menu.style.display = "none";
    }
  });

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", function(){
      window.setupOpplevelserLoginWidget(null);
    });
  }else{
    window.setupOpplevelserLoginWidget(null);
  }
})();
</script>

<script>
(function(){
  const KEY = "kvimarka92SelectedBibleVerse";
  const OVERRIDE_KEY = "kvimarka92BibleSearchInputVerse";

  function readField(id){
    const el = document.getElementById(id);
    return el ? String(el.value || "").trim() : "";
  }

  function getCurrentBibleVerseFromPage(){
    const reference =
      readField("bibleReference") ||
      readField("editBibleReference");

    const text =
      readField("bibleText") ||
      readField("editBibleText");

    const source =
      readField("bibleSource") ||
      readField("editBibleSource") ||
      "Bibelen på Norsk (1930)";

    return {
      reference,
      text,
      source,
      sourceId:"nb-1930",
      selectedAt:new Date().toISOString()
    };
  }

  function prepareBibleSearchFromCurrentPage(){
    const verse = getCurrentBibleVerseFromPage();

    try{
      sessionStorage.setItem(OVERRIDE_KEY, JSON.stringify(verse));
      sessionStorage.setItem(KEY, JSON.stringify(verse));

      // localStorage oppdateres også slik at nytt popup-vindu kan lese samme verdi.
      // Men sessionStorage override er fasit for akkurat denne åpningen.
      localStorage.setItem(OVERRIDE_KEY, JSON.stringify(verse));
      localStorage.setItem(KEY, JSON.stringify(verse));
    }catch(error){}

    return verse;
  }

  function applySelectedBibleVerseToPage(verse){
    if(!verse){
      return;
    }

    const normalRef = document.getElementById("bibleReference");
    const normalText = document.getElementById("bibleText");
    const normalSource = document.getElementById("bibleSource");

    const editRef = document.getElementById("editBibleReference");
    const editText = document.getElementById("editBibleText");
    const editSource = document.getElementById("editBibleSource");

    if(normalRef) normalRef.value = verse.reference || "";
    if(normalText) normalText.value = verse.text || "";
    if(normalSource) normalSource.value = verse.source || "Bibelen på Norsk (1930)";

    if(editRef) editRef.value = verse.reference || "";
    if(editText) editText.value = verse.text || "";
    if(editSource) editSource.value = verse.source || "Bibelen på Norsk (1930)";

    if(typeof window.updateBiblePreview === "function"){
      window.updateBiblePreview();
    }
    if(window.updateBibleHeaderDisplay){ window.updateBibleHeaderDisplay(); }

    for(const id of ["bibleReference","bibleText","bibleSource","editBibleReference","editBibleText","editBibleSource"]){
      const field = document.getElementById(id);
      if(field){
        field.dispatchEvent(new Event("input", { bubbles:true }));
        field.dispatchEvent(new Event("change", { bubbles:true }));
      }
    }

    try{
      sessionStorage.setItem(KEY, JSON.stringify(verse));
      sessionStorage.setItem(OVERRIDE_KEY, JSON.stringify(verse));
      localStorage.setItem(KEY, JSON.stringify(verse));
      localStorage.setItem(OVERRIDE_KEY, JSON.stringify(verse));
    }catch(error){}
  }

  window.prepareBibleSearchFromCurrentPage = prepareBibleSearchFromCurrentPage;
  window.applySelectedBibleVerseToPage = applySelectedBibleVerseToPage;

  window.addEventListener("message", event => {
    if(!event.data || event.data.type !== "kvimarka92:bible-verse-selected"){
      return;
    }

    applySelectedBibleVerseToPage(event.data.payload);
  });
})();
</script>

<script>
(function(){
  function isoToNoDate(value){
    const text = String(value || "").trim();

    const iso = text.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if(iso){
      return iso[3] + "." + iso[2] + "." + iso[1];
    }

    const us = text.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if(us){
      return String(us[2]).padStart(2, "0") + "." + String(us[1]).padStart(2, "0") + "." + us[3];
    }

    return text;
  }

  function noDateToIso(value){
    const text = String(value || "").trim();

    const no = text.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
    if(no){
      return no[3] + "-" + String(no[2]).padStart(2, "0") + "-" + String(no[1]).padStart(2, "0");
    }

    const iso = text.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if(iso){
      return iso[1] + "-" + iso[2] + "-" + iso[3];
    }

    const us = text.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if(us){
      return us[3] + "-" + String(us[1]).padStart(2, "0") + "-" + String(us[2]).padStart(2, "0");
    }

    return text;
  }

  window.formatOpplevelserDate = isoToNoDate;
  window.parseOpplevelserDate = noDateToIso;


  function patchDateInputById(id){
    const el = document.getElementById(id);

    if(!el){
      return;
    }

    const currentValue = isoToNoDate(el.value || el.getAttribute("value") || "");

    if(el.type === "date"){
      const replacement = document.createElement("input");
      replacement.type = "text";
      replacement.id = el.id;
      replacement.name = el.name || el.id;
      replacement.className = el.className || "";
      replacement.placeholder = "dd.mm.åååå";
      replacement.inputMode = "numeric";
      replacement.autocomplete = "off";
      replacement.value = currentValue;

      for(const attr of el.attributes){
        if(["type", "id", "name", "class", "value", "placeholder", "inputmode", "autocomplete"].includes(attr.name)){
          continue;
        }
        replacement.setAttribute(attr.name, attr.value);
      }

      el.replaceWith(replacement);
      return;
    }

    el.type = "text";
    el.placeholder = "dd.mm.åååå";
    el.inputMode = "numeric";
    el.autocomplete = "off";

    if(currentValue){
      el.value = currentValue;
    }
  }

  function patchOpplevelserDateInputs(){
    patchDateInputById("experienceDate");
    patchDateInputById("editExperienceDate");

    document.querySelectorAll('input[type="date"]').forEach(input => {
      if(input.id === "experienceDate" || input.id === "editExperienceDate" || input.id === "experienceDatePicker" || input.id === "editExperienceDatePicker"){
        return;
      }

      input.type = "text";
      input.placeholder = "dd.mm.åååå";
      input.inputMode = "numeric";
      input.value = isoToNoDate(input.value || input.getAttribute("value") || "");
    });
  }


  window.patchOpplevelserDateInputs = patchOpplevelserDateInputs;

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", patchOpplevelserDateInputs);
  }else{
    patchOpplevelserDateInputs();
  }
})();
</script>

<script>
(function(){
  const THEME_KEYS = ["kvimarka92Theme", "opplevelserTheme", "theme"];

  function readStoredTheme(){
    for(const key of THEME_KEYS){
      try{
        const value = localStorage.getItem(key);
        if(value === "light" || value === "dark"){
          return value;
        }
      }catch(error){}
    }

    return "";
  }

  function storeTheme(theme){
    THEME_KEYS.forEach(key => {
      try{
        localStorage.setItem(key, theme);
      }catch(error){}
    });
  }

  function setTheme(theme){
    const isLight = theme === "light";

    document.documentElement.classList.toggle("light-mode", isLight);
    document.documentElement.classList.toggle("light", isLight);
    document.documentElement.classList.toggle("dark-mode", !isLight);
    document.documentElement.classList.toggle("dark", !isLight);

    if(document.body){
      document.body.classList.toggle("light-mode", isLight);
      document.body.classList.toggle("light", isLight);
      document.body.classList.toggle("dark-mode", !isLight);
      document.body.classList.toggle("dark", !isLight);
    }

    storeTheme(theme);
  }

  function applySavedTheme(){
    const stored = readStoredTheme();
    if(stored === "light" || stored === "dark"){
      setTheme(stored);
      return;
    }

    const body = document.body;
    const currentlyLight =
      document.documentElement.classList.contains("light-mode")
      || document.documentElement.classList.contains("light")
      || (body && (body.classList.contains("light-mode") || body.classList.contains("light")));

    setTheme(currentlyLight ? "light" : "dark");
  }

  function isThemeButton(button){
    if(!button){
      return false;
    }

    const txt = (button.textContent || "").trim();
    const title = (button.getAttribute("title") || button.getAttribute("aria-label") || "").toLowerCase();
    const cls = button.className ? String(button.className).toLowerCase() : "";

    return (
      txt === "☀" || txt === "☾" || txt === "🌙" || txt === "☼" ||
      title.includes("light") || title.includes("dark") ||
      title.includes("lys") || title.includes("mørk") ||
      cls.includes("theme")
    );
  }

  function toggleThemeFromButton(event){
    const button = event.target.closest("button");
    if(!isThemeButton(button)){
      return;
    }

    event.preventDefault();
    event.stopPropagation();

    const body = document.body;
    const currentlyLight =
      document.documentElement.classList.contains("light-mode")
      || document.documentElement.classList.contains("light")
      || (body && (body.classList.contains("light-mode") || body.classList.contains("light")));

    setTheme(currentlyLight ? "dark" : "light");
  }

  window.applyRealListTheme = applySavedTheme;
  window.setOpplevelserTheme = setTheme;

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", applySavedTheme);
  }else{
    applySavedTheme();
  }

  document.addEventListener("click", toggleThemeFromButton, true);
})();
</script>

<script>
/* List v50d: final selected-row marker */
(function(){
  function markRow(row){
    if(!row){ return; }

    const list = row.closest(".items") || row.parentElement;
    if(list){
      list.querySelectorAll(".item.selected, .item.active, .item.is-selected, .item[data-selected='true'], .item[aria-selected='true']").forEach(el => {
        if(el === row){ return; }
        el.classList.remove("selected", "active", "is-selected");
        el.removeAttribute("data-selected");
        el.removeAttribute("aria-selected");
      });
    }

    row.classList.add("selected", "is-selected");
    row.setAttribute("data-selected", "true");
    row.setAttribute("aria-selected", "true");
  }

  function markCurrentOrFirst(){
    const explicit = document.querySelector(".items .item.selected, .items .item.active, .items .item.is-selected, .items .item[data-selected='true'], .items .item[aria-selected='true']");
    if(explicit){
      markRow(explicit);
      return;
    }

    const first = document.querySelector(".items .item");
    if(first){
      markRow(first);
    }
  }

  document.addEventListener("click", event => {
    const row = event.target.closest(".items .item");
    if(row){
      markRow(row);
    }
  }, true);

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", () => {
      [100, 300, 700, 1200, 2000].forEach(delay => setTimeout(markCurrentOrFirst, delay));
    });
  }else{
    [100, 300, 700, 1200, 2000].forEach(delay => setTimeout(markCurrentOrFirst, delay));
  }
})();
</script>



<script>
/* Opplevelser mobile polish v51/v44:
   - text-mode sun/moon icons
   - native date input on mobile/iOS */
(function(){
  function isThemeButton(button){
    if(!button){ return false; }

    const text = (button.textContent || "").trim();
    const title = (button.getAttribute("title") || button.getAttribute("aria-label") || "").toLowerCase();
    const cls = button.className ? String(button.className).toLowerCase() : "";

    return (
      text === "☀" || text === "☀︎" || text === "☾" || text === "🌙" || text === "☼" || text === "◐" ||
      title.includes("light") || title.includes("dark") ||
      title.includes("lys") || title.includes("mørk") ||
      cls.includes("theme")
    );
  }

  function pageIsLight(){
    return (
      document.documentElement.classList.contains("light-mode") ||
      document.documentElement.classList.contains("light") ||
      document.body.classList.contains("light-mode") ||
      document.body.classList.contains("light")
    );
  }

  function updateThemeIcon(){
    const isLight = pageIsLight();

    document.querySelectorAll("button").forEach(button => {
      if(!isThemeButton(button)){ return; }

      const symbol = isLight ? "☾" : "☀︎";
      button.innerHTML = '<span class="theme-symbol">' + symbol + '</span>';
      button.setAttribute("title", isLight ? "Bytt til mørk modus" : "Bytt til lys modus");
      button.setAttribute("aria-label", isLight ? "Bytt til mørk modus" : "Bytt til lys modus");
      button.classList.add("theme-button");
    });
  }

  function pad2(value){
    return String(value).padStart(2, "0");
  }

  function noToIso(value){
    const text = String(value || "").trim();

    const no = text.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
    if(no){
      return no[3] + "-" + pad2(no[2]) + "-" + pad2(no[1]);
    }

    const iso = text.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if(iso){
      return iso[1] + "-" + iso[2] + "-" + iso[3];
    }

    return text;
  }

  function isoToNo(value){
    const text = String(value || "").trim();

    const iso = text.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if(iso){
      return iso[3] + "." + iso[2] + "." + iso[1];
    }

    return text;
  }

  function isMobileDateEnvironment(){
    return (
      window.matchMedia("(pointer: coarse)").matches ||
      window.matchMedia("(max-width: 700px)").matches ||
      /iPad|iPhone|iPod|Android/i.test(navigator.userAgent)
    );
  }

  function patchOneDateInput(id){
    const el = document.getElementById(id);
    if(!el){ return; }

    const mobile = isMobileDateEnvironment();

    if(mobile){
      const iso = noToIso(el.value);
      el.type = "date";
      if(/^\d{4}-\d{2}-\d{2}$/.test(iso)){
        el.value = iso;
      }
      el.removeAttribute("readonly");
      el.onclick = null;
      return;
    }

    // Desktop beholder norsk tekstvisning.
    el.type = "text";
    if(el.value){
      el.value = isoToNo(el.value);
    }
  }

  function patchMobileDates(){
    patchOneDateInput("experienceDate");
    patchOneDateInput("editExperienceDate");
  }

  window.updateOpplevelserThemeIcon = updateThemeIcon;
  window.patchOpplevelserMobileDates = patchMobileDates;

  function run(){
    updateThemeIcon();
    patchMobileDates();
  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", run);
  }else{
    run();
  }

  window.addEventListener("pageshow", run);
  window.addEventListener("resize", () => setTimeout(run, 100));

  document.addEventListener("click", event => {
    const button = event.target.closest("button");
    if(isThemeButton(button)){
      setTimeout(updateThemeIcon, 0);
      setTimeout(updateThemeIcon, 80);
      setTimeout(updateThemeIcon, 250);
    }

    setTimeout(patchMobileDates, 50);
  }, true);

  [100, 400, 900, 1500].forEach(delay => setTimeout(run, delay));
})();
</script>
