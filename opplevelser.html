<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Opplevelser</title>
  <style>
    :root{
      color-scheme: light dark;
      --bg:#f4f5f7;
      --card:#ffffff;
      --text:#172033;
      --muted:#5d6678;
      --border:#d8dde8;
      --accent:#2563eb;
      --danger:#b42318;
      --ok:#067647;
      --soft:#eef2ff;
      --input-bg:transparent;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --bg:#10131a;
        --card:#171b24;
        --text:#f1f5f9;
        --muted:#a7b0c0;
        --border:#303746;
        --accent:#7aa2ff;
        --soft:#20293a;
        --input-bg:#151a24;
      }
    }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:var(--bg); color:var(--text); }
    .wrap{ max-width:1100px; margin:0 auto; padding:18px; }
    .card{ background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px; box-shadow:0 10px 25px rgba(15,23,42,.08); }
    h1{ margin:0 0 4px; font-size:1.6rem; }
    .sub{ color:var(--muted); margin:0 0 18px; }
    .toolbar{ display:grid; grid-template-columns:1fr auto auto; gap:10px; align-items:end; margin-bottom:14px; }
    label{ display:block; font-weight:650; margin:0 0 6px; }
    input, textarea, select{ width:100%; min-height:44px; border:1px solid var(--border); border-radius:10px; padding:10px 12px; font:inherit; background:var(--input-bg); color:var(--text); box-sizing:border-box; }
    textarea{ min-height:94px; resize:vertical; }
    button{ border:0; border-radius:999px; padding:10px 14px; min-height:42px; font-weight:700; cursor:pointer; background:var(--accent); color:white; }
    button.secondary{ background:transparent; color:var(--text); border:1px solid var(--border); }
    button:disabled{ opacity:.6; cursor:not-allowed; }
    .status{ margin-top:14px; padding:10px 12px; border-radius:10px; border:1px solid var(--border); color:var(--muted); white-space:pre-wrap; }
    .status.err{ color:var(--danger); }
    .status.ok{ color:var(--ok); }
    .list{ display:grid; grid-template-columns:340px 1fr; gap:14px; }
    .items{ border:1px solid var(--border); border-radius:12px; overflow:hidden; background:rgba(127,127,127,.04); }
    .item{ display:block; width:100%; padding:12px; border:0; border-bottom:1px solid var(--border); border-radius:0; background:transparent; color:var(--text); text-align:left; cursor:pointer; }
    .item:hover, .item.active{ background:var(--soft); }
    .item-title{ font-weight:800; margin-bottom:4px; }
    .item-meta{ color:var(--muted); font-size:.92rem; line-height:1.35; }
    .desktop-extra{ display:inline; }
    .details{ border:1px solid var(--border); border-radius:12px; padding:14px; min-height:360px; }
    .detail-head{ display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom:10px; }
    .detail-title{ font-size:1.3rem; font-weight:850; margin:0 0 8px; }
    .detail-meta{ color:var(--muted); margin-bottom:14px; }
    .section{ margin-top:14px; }
    .section h3{ margin:0 0 6px; font-size:1rem; }
    .section p{ margin:0; line-height:1.45; white-space:pre-wrap; }
    .bible{ border:1px dashed var(--border); border-radius:10px; padding:10px 12px; }
    .empty{ color:var(--muted); padding:18px; }
    .edit-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .edit-grid .full{ grid-column:1 / -1; }
    .edit-actions{ display:flex; flex-wrap:wrap; gap:10px; margin-top:14px; }
    .readonly-actions{ display:flex; gap:10px; flex-wrap:wrap; }
    @media(max-width:800px){
      .wrap{ padding:10px; }
      .toolbar{ grid-template-columns:1fr; }
      .list{ grid-template-columns:1fr; }
      .details{ min-height:0; }
      .desktop-extra{ display:none; }
      .item-meta{ font-size:.9rem; }
      .edit-grid{ grid-template-columns:1fr; }
      .edit-grid .full{ grid-column:auto; }
      .detail-head{ flex-direction:column; }
      .readonly-actions{ width:100%; }
      .readonly-actions button{ width:100%; }
    }
  
    .mobile-only{ display:none; }

    @media(max-width:800px){
      .mobile-only{ display:inline-flex; }
      .card{ padding:14px; }
      h1{ font-size:1.45rem; }
      .sub{ font-size:.95rem; }

      .toolbar{
        grid-template-columns:1fr;
        gap:8px;
      }

      .toolbar button{
        width:100%;
      }

      .list{
        grid-template-columns:1fr;
      }

      .items.mobile-detail-open{
        display:none;
      }

      .details{
        display:none;
        min-height:0;
      }

      .details.mobile-visible{
        display:block;
      }

      .item{
        padding:14px 12px;
      }

      .item-title{
        font-size:1rem;
        line-height:1.25;
        margin-bottom:6px;
      }

      .item-meta{
        font-size:.92rem;
        line-height:1.35;
      }

      .desktop-extra{
        display:none !important;
      }

      .detail-head{
        flex-direction:column;
      }

      .readonly-actions{
        width:100%;
        display:grid;
        grid-template-columns:1fr;
      }

      .readonly-actions button{
        width:100%;
      }

      .edit-grid{
        grid-template-columns:1fr;
      }

      .edit-grid .full{
        grid-column:auto;
      }
    }

  </style>
  <!-- version: opplevelser-list-v3-mobile-list-first-2026-06-15 -->
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Opplevelser</h1>
      <p class="sub" id="userLine">Laster opplevelser ...</p>

      <div class="toolbar">
        <div>
          <label for="searchBox">Søk</label>
          <input id="searchBox" type="search" placeholder="Søk i overskrift, tekst, sted, miljø eller bibelsted" autocomplete="off">
        </div>
        <button type="button" id="refreshBtn">Søk</button>
        <button type="button" class="secondary" onclick="window.location.href='opplevelser-registrer.html'">Ny opplevelse</button>
      </div>

      <div class="list">
        <div class="items" id="items"><div class="empty">Laster ...</div></div>
        <div class="details" id="details"><div class="empty">Velg en opplevelse i listen.</div></div>
      </div>

      <div id="status" class="status">Klar.</div>
    </section>
  </main>

  <script>
    const API_BASE = window.OPPLEVELSER_API_BASE || (
      location.hostname === "kvimarka92.carstereogarage.com" || location.hostname === "www.kvimarka92.carstereogarage.com"
        ? ""
        : "https://api-kvimarka92.carstereogarage.com"
    );

    let currentItems = [];
    let selectedId = null;
    let editMode = false;
    let searchTimer = null;

    const el = id => document.getElementById(id);
    const statusEl = el("status");

    function setStatus(text, kind){
      statusEl.textContent = text;
      statusEl.className = "status" + (kind ? " " + kind : "");
    }

    function esc(value){
      return String(value == null ? "" : value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function apiFetch(path, options){
      const safeOptions = options || {};
      const method = String(safeOptions.method || "GET").toUpperCase();
      const headers = {
        ...(safeOptions.headers || {})
      };

      if(method !== "GET" && safeOptions.body !== undefined && !headers["Content-Type"]){
        headers["Content-Type"] = "text/plain;charset=UTF-8";
      }

      const res = await fetch(API_BASE + path, {
        credentials:"include",
        ...safeOptions,
        method,
        headers
      });

      const data = await res.json().catch(() => ({}));

      if(!res.ok){
        throw new Error(data.detail || data.error || `HTTP ${res.status}`);
      }

      return data;
    }

    function bestTitle(item){
      return item.heading || item.bibleReference || item.place || item.environment || "(uten overskrift)";
    }

    function selectedItem(){
      return currentItems.find(entry => entry.id === selectedId) || null;
    }

    function isMobileView(){
      return window.matchMedia("(max-width:800px)").matches;
    }

    function setMobileDetailState(open){
      if(isMobileView()){
        el("items").classList.toggle("mobile-detail-open", !!open);
        el("details").classList.toggle("mobile-visible", !!open);
      }else{
        el("items").classList.remove("mobile-detail-open");
        el("details").classList.remove("mobile-visible");
      }
    }

    function renderItems(){
      const box = el("items");

      if(!currentItems.length){
        box.innerHTML = '<div class="empty">Ingen opplevelser funnet.</div>';
        el("details").innerHTML = '<div class="empty">Ingen opplevelser å vise.</div>';
        setMobileDetailState(false);
        return;
      }

      box.innerHTML = currentItems.map(item => `
        <button type="button" class="item ${selectedId === item.id ? "active" : ""}" onclick="selectItem(${Number(item.id)})">
          <div class="item-title">${esc(bestTitle(item))}</div>
          <div class="item-meta">
            ${esc(item.experienceDate || "")}
            ${item.place ? " · " + esc(item.place) : ""}
            <span class="desktop-extra">
              ${item.environment ? " · " + esc(item.environment) : ""}
              ${item.bibleReference ? "<br>" + esc(item.bibleReference) : ""}
            </span>
          </div>
        </button>
      `).join("");

      if(!selectedId || !currentItems.some(item => item.id === selectedId)){
        selectedId = isMobileView() ? null : currentItems[0].id;
      }

      if(selectedId){
        renderDetails();
      }else{
        el("details").innerHTML = '<div class="empty">Velg en opplevelse i listen.</div>';
        setMobileDetailState(false);
      }
    }

    function renderSection(title, text){
      if(!String(text || "").trim()) return "";
      return `
        <div class="section">
          <h3>${esc(title)}</h3>
          <p>${esc(text)}</p>
        </div>
      `;
    }

    function renderDetails(){
      const item = selectedItem();
      const box = el("details");

      if(!item){
        box.innerHTML = '<div class="empty">Velg en opplevelse i listen.</div>';
        return;
      }

      if(editMode){
        renderEditForm(item);
        return;
      }

      box.innerHTML = `
        <div class="detail-head">
          <div>
            <div class="detail-title">${esc(bestTitle(item))}</div>
            <div class="detail-meta">
              ${esc(item.experienceDate || "")}
              ${item.place ? " · " + esc(item.place) : ""}
              ${item.environment ? " · " + esc(item.environment) : ""}
            </div>
          </div>
          <div class="readonly-actions">
            <button type="button" class="secondary mobile-only" onclick="backToMobileList()">Tilbake til liste</button>
            <button type="button" class="secondary" onclick="startEdit()">Rediger</button>
          </div>
        </div>

        ${item.bibleReference || item.bibleText ? `
          <div class="section">
            <h3>Bibelsted</h3>
            <div class="bible">
              <strong>${esc(item.bibleReference || "")}</strong>
              ${item.bibleText ? `<p>${esc(item.bibleText)}</p>` : ""}
              ${item.bibleSource ? `<div class="item-meta">${esc(item.bibleSource)}</div>` : ""}
            </div>
          </div>
        ` : ""}

        ${renderSection("Foranledning", item.occasion)}
        ${renderSection("Opplevelse", item.experience)}
        ${renderSection("Konsekvens", item.consequence)}
        ${renderSection("Notat", item.note)}
      `;
    }

    function renderEditForm(item){
      el("details").innerHTML = `
        <form id="editForm">
          <div class="edit-grid">
            <div class="full">
              <label for="editHeading">Overskrift</label>
              <input id="editHeading" value="${esc(item.heading || "")}" maxlength="160">
            </div>

            <div>
              <label for="editDate">Dato</label>
              <input id="editDate" type="date" value="${esc(item.experienceDate || "")}">
            </div>

            <div>
              <label for="editPlace">Sted</label>
              <input id="editPlace" value="${esc(item.place || "")}">
            </div>

            <div>
              <label for="editEnvironment">Miljø</label>
              <input id="editEnvironment" value="${esc(item.environment || "")}">
            </div>

            <div>
              <label for="editBibleReference">Bibelreferanse</label>
              <input id="editBibleReference" value="${esc(item.bibleReference || "")}">
            </div>

            <div>
              <label for="editBibleSource">Bibelkilde</label>
              <input id="editBibleSource" value="${esc(item.bibleSource || "Bibelen på Norsk (1930)")}" >
            </div>

            <div class="full">
              <label for="editBibleText">Bibeltekst</label>
              <textarea id="editBibleText">${esc(item.bibleText || "")}</textarea>
            </div>

            <div class="full">
              <label for="editOccasion">Foranledning</label>
              <textarea id="editOccasion">${esc(item.occasion || "")}</textarea>
            </div>

            <div class="full">
              <label for="editExperience">Opplevelse</label>
              <textarea id="editExperience">${esc(item.experience || "")}</textarea>
            </div>

            <div class="full">
              <label for="editConsequence">Konsekvens</label>
              <textarea id="editConsequence">${esc(item.consequence || "")}</textarea>
            </div>

            <div class="full">
              <label for="editNote">Notat</label>
              <textarea id="editNote">${esc(item.note || "")}</textarea>
            </div>
          </div>

          <div class="edit-actions">
            <button type="submit">Lagre endringer</button>
            <button type="button" class="secondary" onclick="cancelEdit()">Avbryt</button>
          </div>
        </form>
      `;

      el("editForm").addEventListener("submit", saveEdit);
    }

    window.selectItem = function(id){
      selectedId = id;
      editMode = false;
      renderItems();
      setMobileDetailState(true);
    };

    window.backToMobileList = function(){
      editMode = false;
      setMobileDetailState(false);
    };

    window.startEdit = function(){
      editMode = true;
      renderDetails();
    };

    window.cancelEdit = function(){
      editMode = false;
      renderDetails();
      setMobileDetailState(true);
    };

    async function saveEdit(event){
      event.preventDefault();

      const item = selectedItem();
      if(!item) return;

      setStatus("Lagrer endringer ...");

      const payload = {
        id:item.id,
        heading:el("editHeading").value,
        experienceDate:el("editDate").value,
        place:el("editPlace").value,
        environment:el("editEnvironment").value,
        bibleReference:el("editBibleReference").value,
        bibleSource:el("editBibleSource").value,
        bibleText:el("editBibleText").value,
        occasion:el("editOccasion").value,
        experience:el("editExperience").value,
        consequence:el("editConsequence").value,
        note:el("editNote").value
      };

      try{
        const data = await apiFetch("/experience-update", {
          method:"POST",
          body:JSON.stringify(payload)
        });

        const index = currentItems.findIndex(entry => entry.id === item.id);
        if(index >= 0 && data.row){
          currentItems[index] = data.row;
        }

        editMode = false;
        renderItems();
        setMobileDetailState(true);
        setStatus("Endringer lagret.", "ok");
      }catch(error){
        setStatus("Kunne ikke lagre endringer: " + error.message, "err");
      }
    }

    async function loadExperiences(){
      const q = el("searchBox").value.trim();
      setStatus("Laster ...");

      const data = await apiFetch(`/experience-list?limit=300&q=${encodeURIComponent(q)}`);
      currentItems = data.items || [];

      el("userLine").textContent = `Innlogget som ${data.user.name || data.user.email} (${data.user.experienceAccess})`;

      if(isMobileView()){
        selectedId = null;
        setMobileDetailState(false);
      }else if(!selectedId || !currentItems.some(item => item.id === selectedId)){
        selectedId = currentItems.length ? currentItems[0].id : null;
      }

      editMode = false;
      renderItems();
      setStatus(`Fant ${data.count} opplevelse(r).`);
    }

    function scheduleLiveSearch(){
      window.clearTimeout(searchTimer);
      searchTimer = window.setTimeout(() => {
        loadExperiences().catch(error => setStatus("Kunne ikke hente opplevelser: " + error.message, "err"));
      }, 250);
    }

    el("refreshBtn").addEventListener("click", () => {
      loadExperiences().catch(error => setStatus("Kunne ikke hente opplevelser: " + error.message, "err"));
    });

    el("searchBox").addEventListener("input", scheduleLiveSearch);

    el("searchBox").addEventListener("keydown", event => {
      if(event.key === "Enter"){
        event.preventDefault();
        loadExperiences().catch(error => setStatus("Kunne ikke hente opplevelser: " + error.message, "err"));
      }
    });

    window.addEventListener("resize", () => {
      if(!isMobileView()){
        if(!selectedId && currentItems.length){
          selectedId = currentItems[0].id;
          renderItems();
        }
        setMobileDetailState(false);
      }else if(!selectedId){
        setMobileDetailState(false);
      }
    });

    loadExperiences().catch(error => setStatus("Kunne ikke hente opplevelser: " + error.message, "err"));
  </script>
</body>
</html>
